      const p1lbl = (su.p1.trim() || 'PLAYER 1').toUpperCase();
      const p2lbl = (su.p2.trim() || 'PLAYER 2').toUpperCase();
      let sub0 = '', sub1 = '';
      if (subs0.length > 1) {
        sub0 = '<div class="panel"><div class="panel-ttl">// WHO OPENS FOR TEAM 1?</div><div class="subgrid">' +
          subs0.map((name, i) => '<div class="subopt ' + (su.subStarters[0] === i ? 'on' : '') + '" data-act="sub" data-team="0" data-i="' + i + '">' + esc(name) + '</div>').join('') + '</div></div>';
      }
      if (subs1.length > 1) {
        sub1 = '<div class="panel"><div class="panel-ttl">// WHO OPENS FOR TEAM 2?</div><div class="subgrid">' +
          subs1.map((name, i) => '<div class="subopt c ' + (su.subStarters[1] === i ? 'on' : '') + '" data-act="sub" data-team="1" data-i="' + i + '">' + esc(name) + '</div>').join('') + '</div></div>';
      }
      const redsOpts = [3, 6, 10, 15].map(n => '<option value="' + n + '" ' + (su.reds === n ? 'selected' : '') + '>' + n + ' REDS</option>').join('');
      const names = loadNames();
      const nameOpts = names.map(n => '<option value="' + esc(n) + '"></option>').join('');
      const recent = loadRecent();
      const target = (S.lastNameField === 'p2') ? 'p2' : 'p1';
      const acc = target === 'p2' ? 'var(--c)' : 'var(--g)', accDim = target === 'p2' ? 'var(--cdim)' : 'var(--gdim)', accLine = target === 'p2' ? 'var(--cline)' : 'var(--gline)';
      // ONE-TAP PLAY AGAIN — restore a full previous matchup (both players at once)
      let playAgain = '';
      if (recent.length) {
        const row = recent.slice(0, 4).map((m, i) => '<button data-act="matchchip" data-i="' + i + '" style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:11px;border:1px solid var(--bd2);background:var(--s2);">' +
          '<span style="font-family:\'Orbitron\',monospace;font-size:11px;font-weight:700;color:var(--g);max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(m.p1) + '</span>' +
          '<span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--low);">VS</span>' +
          '<span style="font-family:\'Orbitron\',monospace;font-size:11px;font-weight:700;color:var(--c);max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(m.p2) + '</span>' +
          '</button>').join('');
        playAgain = '<div><div class="fld-lbl" style="margin-top:2px;"><i class="fa-solid fa-rotate-right"></i> PLAY AGAIN — TAP TO LOAD A PAST MATCH</div><div style="display:flex;flex-wrap:wrap;gap:8px;">' + row + '</div></div>';
      }
      // TEAM BUILDER — tap names to APPEND to the active player (A then B → A/B)
      let builder = '';
      if (names.length) {
        const inTeam = (su[target] || '').split('/').map(s => s.trim().toUpperCase()).filter(Boolean);
        const row = names.slice(0, 14).map(n => {
          const on = inTeam.includes(n.toUpperCase());
          return '<button data-act="namechip" data-name="' + esc(n) + '" style="padding:8px 13px;border-radius:9px;border:1px solid ' + (on ? accLine : 'var(--bd2)') + ';background:' + (on ? accDim : 'var(--s2)') + ';color:' + (on ? acc : 'var(--mid)') + ';font-family:\'Share Tech Mono\',monospace;font-size:11px;letter-spacing:.5px;font-weight:' + (on ? '700' : '400') + ';">' + (on ? '✓ ' : '') + esc(n) + '</button>';
        }).join('');
        const seg = '<div style="display:inline-flex;border:1px solid var(--bd2);border-radius:9px;overflow:hidden;flex-shrink:0;">' +
          '<button data-act="settarget" data-t="p1" style="padding:6px 13px;font-family:\'Share Tech Mono\',monospace;font-size:10px;letter-spacing:1px;background:' + (target === 'p1' ? 'var(--gdim)' : 'transparent') + ';color:' + (target === 'p1' ? 'var(--g)' : 'var(--low)') + ';">P1</button>' +
          '<button data-act="settarget" data-t="p2" style="padding:6px 13px;font-family:\'Share Tech Mono\',monospace;font-size:10px;letter-spacing:1px;background:' + (target === 'p2' ? 'var(--cdim)' : 'transparent') + ';color:' + (target === 'p2' ? 'var(--c)' : 'var(--low)') + ';">P2</button>' +
          '</div>';
        builder = '<div class="panel"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px;"><div class="panel-ttl" style="margin-bottom:0;">// ADD TO TEAM</div>' + seg + '</div>' +
          '<div style="display:flex;flex-wrap:wrap;gap:7px;">' + row + '</div>' +
          '<div class="lobby-sub" style="text-align:left;letter-spacing:.3px;margin-top:10px;line-height:1.5;">Tap a name to add it to the <b style="color:' + acc + '">' + (target === 'p2' ? 'PLAYER 2' : 'PLAYER 1') + '</b> slot. Tap a second name for doubles (→ <b style="color:' + acc + '">A/B</b>). Tap a ✓ name to remove it.</div></div>';
      }
      const breakOpts = '<option value="0" ' + (su.breakFirst === 0 ? 'selected' : '') + '>' + esc(p1lbl) + '</option><option value="1" ' + (su.breakFirst === 1 ? 'selected' : '') + '>' + esc(p2lbl) + '</option>';
      const frameDefs = [{ n: 1, sub: 'FRAME' }, { n: 3, sub: '2 TO WIN' }, { n: 5, sub: '3 TO WIN' }, { n: 7, sub: '4 TO WIN' }, { n: 9, sub: '5 TO WIN' }];
      const frameOpts = frameDefs.map(f => '<div class="fopt ' + (su.frames === f.n ? 'on' : '') + '" data-act="frame" data-n="' + f.n + '"><span class="fo-n">' + f.n + '</span><span class="fo-s">' + f.sub + '</span></div>').join('');
      return '<div class="scrn"><div class="pad">' +
        '<div class="back" data-act="back"><i class="fa-solid fa-arrow-left"></i> BACK TO LOBBY</div>' +
        '<div style="text-align:center;"><div class="setup-ttl">NEW MATCH</div><div class="lobby-sub" style="margin-top:4px;">// MATCH SETUP //</div></div>' +
        '<div class="codebox"><div><div class="code-l">SHARE CODE WITH FRIENDS</div><div class="code-v">' + esc(S.pendingRoomCode || '——') + '</div></div><button class="code-cp" data-act="copyPending">COPY</button></div>' +
        '<div class="row2">' +
        '<div><div class="fld-lbl"><i class="fa-solid fa-circle" style="color:var(--g);font-size:7px;"></i> PLAYER 1</div><input class="fin" data-fkey="p1" list="snk-names" placeholder="Oudom" maxlength="24" value="' + esc(su.p1) + '"></div>' +
        '<div><div class="fld-lbl"><i class="fa-solid fa-circle" style="color:var(--c);font-size:7px;"></i> PLAYER 2</div><input class="fin p2" data-fkey="p2" list="snk-names" placeholder="Deepak" maxlength="24" value="' + esc(su.p2) + '"></div>' +
        '</div>' +
        '<datalist id="snk-names">' + nameOpts + '</datalist>' +
        '<div class="lobby-sub" style="text-align:left;letter-spacing:1px;margin-top:-6px;">Tip: type two names like <b style="color:var(--mid)">ANN/BEN</b> for a doubles team.</div>' +
        playAgain + builder +
        sub0 + sub1 +
        '<div class="row2">' +
        '<div><div class="fld-lbl">RED BALLS</div><select class="fin" data-fkey="reds">' + redsOpts + '</select></div>' +
        '<div><div class="fld-lbl">BREAK FIRST</div><select class="fin" data-fkey="break">' + breakOpts + '</select></div>' +
        '</div>' +
        '<div class="panel"><div class="panel-ttl">// MATCH FORMAT</div><div class="frame-grid">' + frameOpts + '</div></div>' +
        '<div class="panel"><div class="panel-ttl">// HEAD START / HANDICAP <span style="color:var(--low)">(optional)</span></div>' +
        '<div class="hcap-row">' +
        '<div class="hcap-side"><div class="hcap-nm">' + esc(p1lbl) + '</div><div class="step"><button data-act="hcap" data-team="0" data-d="-5">−</button><b>' + su.hcap[0] + '</b><button data-act="hcap" data-team="0" data-d="5">+</button></div></div>' +
        '<div class="hcap-side"><div class="hcap-nm">' + esc(p2lbl) + '</div><div class="step c"><button data-act="hcap" data-team="1" data-d="-5">−</button><b>' + su.hcap[1] + '</b><button data-act="hcap" data-team="1" data-d="5">+</button></div></div>' +
        '</div></div>' +
        '<button class="btn-primary" data-act="start"><i class="fa-solid fa-play"></i> START MATCH</button>' +
        '</div></div>';
    }

    function buildNameHTML(G, ti) {
      const subs = getSubPlayers(G, ti); const sp = G.subPlayer || [0, 0];
      if (subs.length <= 1) return '<span class="psub ' + (G.cur === ti ? ('cur' + ti) : '') + '">' + esc(subs[0] || '?') + '</span>';
      const idx = sp[ti] % subs.length;
      return subs.map((name, i) => {
        const cur = (i === idx && G.cur === ti);
        return '<span class="psub ' + (cur ? ('cur' + ti) : 'off') + '">' + esc(name) + '</span>' + (i < subs.length - 1 ? '<span class="pslash">/</span>' : '');
      }).join('');
    }

    function renderGame() {
      const G = S.G, land = S.viewport.landscape;
      const tf = G.totalFrames || 1, toWin = Math.ceil(tf / 2);
      const fw0 = G.frameWins ? G.frameWins[0] : 0, fw1 = G.frameWins ? G.frameWins[1] : 0;
      let target; if (G.phase === PHASE.REDS) target = G.nextIsRed ? 'RED' : 'COLOUR'; else if (G.phase === PHASE.COLORS) target = (COLOR_ORDER[G.colourIndex] || '—').toUpperCase(); else target = 'ENDED';
      const enabled = new Set();
      if (G.phase === PHASE.REDS) { if (G.nextIsRed && G.redsRemaining > 0) enabled.add('red'); else if (!G.nextIsRed) ['yellow', 'green', 'brown', 'blue', 'pink', 'black'].forEach(b => enabled.add(b)); }
      else if (G.phase === PHASE.COLORS) { const t = COLOR_ORDER[G.colourIndex]; if (t) enabled.add(t); }
      const ballsHtml = BALL_ORDER.map(c => '<button class="ball b-' + c + ' ' + (enabled.has(c) ? '' : 'dis') + '" data-act="pot" data-colour="' + c + '" data-pts="' + BALL_PTS[c] + '"><span class="bp">' + BALL_PTS[c] + '</span><span class="bn">' + BALL_NAMES[c] + '</span></button>').join('');

      const sit = calcSnooker(G);
      let snkHtml = '';
      if (CONFIG.snookerHints) {
        if (sit.status === 'snookers') snkHtml = '<div class="snk-st warn"><b>' + esc(G.players[sit.trailer]) + '</b> NEEDS <b>' + sit.snookersNeeded + '</b> SNOOKER' + (sit.snookersNeeded > 1 ? 'S' : '') + '</div>';
        else if (sit.status === 'decided') snkHtml = '<div class="snk-st dead"><b>FRAME DECIDED</b> · <b>' + esc(G.players[sit.leader]) + '</b> WINS</div>';
      }

      const diff = Math.abs((G.scores[0] || 0) - (G.scores[1] || 0));
      const diffLabel = diff === 0 ? 'LEVEL' : '+' + diff;
      const curName = getActiveName(G, G.cur);
      const nextHint = 'next: ' + G.players[1 - G.cur].split('/')[0];

      let banner = '';
      if (tf > 1) {
        const pips0 = Array.from({ length: toWin }, (_, i) => '<div class="pip ' + (i < fw0 ? 'w0' : '') + '"></div>').join('');
        const pips1 = Array.from({ length: toWin }, (_, i) => '<div class="pip ' + (i < fw1 ? 'w1' : '') + '"></div>').join('');
        banner = '<div class="fbanner"><div class="fpips">' + pips0 + '</div><div class="fb-mid"><div class="fb-sc">' + fw0 + ' — ' + fw1 + '</div><div class="fb-lb">FRAME ' + (G.currentFrameNum || 1) + ' OF ' + tf + '</div></div><div class="fpips r">' + pips1 + '</div></div>';
      }

      let logHtml = '';
      if (CONFIG.showMatchLog) {
        const rows = (G.logs || []).map(e => '<div class="le ' + esc(e.type) + '"><span class="le-ts">' + esc(e.ts) + '</span><span class="le-tx">' + esc(e.who + (e.action ? ' · ' + e.action : '')) + '</span><span class="le-pt">' + esc(e.pts || '') + '</span></div>').join('');
        logHtml = '<div class="land-right"><div class="log-sec"><div class="minilbl">// MATCH LOG</div><div class="log-scroll">' + rows + '</div></div></div>';
      }

      return '<div class="game">' +
        '<div class="sync ' + (S.sync.online ? '' : 'off') + '"><div class="sync-dot"></div><span>' + esc(S.sync.label) + '</span></div>' +
        banner +
        '<div class="gbody ' + (land ? 'land' : '') + '">' +
        '<div class="turnbar t' + G.cur + '"><span class="ta">▶</span><span class="tn">' + esc(curName) + '</span><span>TO PLAY</span><span class="tnext">' + esc(nextHint) + '</span></div>' +
        '<div class="land-left">' +
        '<div class="sb ' + (S.flash ? 'flash' : '') + '">' +
        '<div class="pside left ' + (G.cur === 0 ? 'act0' : '') + '"><div class="ptag">P-01</div><div class="pnm">' + buildNameHTML(G, 0) + '</div><div class="psc ' + (S.bump[0] ? 'bump' : '') + '">' + G.scores[0] + '</div><div class="pbrk">BRK <b>' + (G.breaks[0] || '—') + '</b></div></div>' +
        '<div class="score-mid"><div class="vs">VS</div><div class="diff">' + diffLabel + '</div><button class="score-edit" data-act="adjustopen"><i class="fa-solid fa-sliders"></i></button></div>' +
        '<div class="pside right ' + (G.cur === 1 ? 'act1' : '') + '"><div class="ptag">P-02</div><div class="pnm">' + buildNameHTML(G, 1) + '</div><div class="psc ' + (S.bump[1] ? 'bump' : '') + '">' + G.scores[1] + '</div><div class="pbrk">BRK <b>' + (G.breaks[1] || '—') + '</b></div></div>' +
        '</div>' +
        '<div class="strip">' +
        '<div class="cell"><div class="cell-l">TARGET</div><div class="cell-v ph">' + esc(target) + '</div></div>' +
        '<div class="cell"><div class="cell-l">REDS</div><div class="cell-v">' + Math.max(0, G.redsRemaining || 0) + '</div></div>' +
        '<div class="cell"><div class="cell-l">AVAIL</div><div class="cell-v">' + calcPointsLeft(G) + '</div></div>' +
        '<div class="cell"><div class="cell-l">PHASE</div><div class="cell-v ph">' + esc(G.phase) + '</div></div>' +
        '</div>' +
        snkHtml +
        '<div class="ball-sec"><div class="minilbl">// POT BALL</div><div class="ball-grid">' + ballsHtml + '</div></div>' +
        '<div class="act-sec"><div class="act-grid">' +
        '<button class="act miss" data-act="miss"><i class="fa-solid fa-xmark"></i><span>MISS</span></button>' +
        '<button class="act foul" data-act="foulopen"><i class="fa-solid fa-triangle-exclamation"></i><span>FOUL</span></button>' +
        '<button class="act endm" data-act="endmatchopen"><i class="fa-solid fa-flag-checkered"></i><span>END MATCH</span></button>' +
        '<button class="act undo" data-act="undo"><i class="fa-solid fa-rotate-left"></i><span>UNDO</span></button>' +
        '</div></div>' +
        '</div>' +
        logHtml +
        '</div>' +
        '</div>';
    }

    /* ---------- overlays ---------- */
    function renderOverlays() {
      switch (S.overlay) {
        case 'foul': return renderFoul();
        case 'adjust': return renderAdjust();
        case 'winner': return renderWinner();
        case 'delete': return renderDelete();
        case 'endmatch': return renderEndMatch();
        case 'analytics': return renderAnalytics();
        case 'conclusion': return renderConclusion();
        default: return '';
      }
    }
    function renderFoul() {
      const G = S.G, f = S.foul;
      const foulerName = getActiveName(G, G.cur), oppName = getActiveName(G, 1 - G.cur);
      const opts = [4, 5, 6, 7].map(p => '<div class="fo" data-act="foulpick" data-pts="' + p + '">' + p + '<small>PTS</small></div>').join('');
      const showRed = G.phase === PHASE.REDS && G.redsRemaining > 0;
      let redBlock = '';
      if (showRed) {
        redBlock = '<div class="toggle-row ' + (f.redOn ? 'on' : '') + '" data-act="toggleRedFoul"><div class="toggle-lbl"><b>REMOVE RED(S)?</b>White potted / red knocked off — take reds off the table</div><div class="tg ' + (f.redOn ? 'on' : '') + '"></div></div>';
        if (f.redOn) redBlock += '<div class="redrem"><div class="redrem-t">REDS TO REMOVE</div><div class="redrem-step"><button data-act="redminus">−</button><span class="rv">' + f.redCount + '</span><button data-act="redplus">+</button></div></div>';
      }
      return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">' +
        '<div class="grip"></div><div class="sh-ttl" style="color:var(--red)">FOUL</div>' +
        '<div class="foul-who"><b>' + esc(foulerName) + '</b> fouls <span class="arr">→</span> <span class="opp">' + esc(oppName) + '</span> gets the points</div>' +
        '<div class="foul-opts">' + opts + '</div>' +
        '<div class="foul-cust"><input data-fkey="foulcustom" type="number" placeholder="custom" min="4" max="147" value="' + esc(f.custom) + '"><button data-act="applyfoul">APPLY</button></div>' +
        redBlock +
        '<button class="sh-cancel" data-act="closeOverlay">CANCEL</button>' +
        '</div></div>';
    }
    function renderAdjust() {
      const G = S.G, a = S.adjust;
      const cur = G.scores[a.team] || 0, next = Math.max(0, cur + a.delta);
      const name0 = getActiveName(G, 0) || 'P1', name1 = getActiveName(G, 1) || 'P2';
      const deltaLabel = a.delta === 0 ? 'no change' : (a.delta > 0 ? '+' + a.delta : '' + a.delta);
      const deltaColor = a.delta > 0 ? 'var(--g)' : a.delta < 0 ? 'var(--red)' : 'var(--low)';
      return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">' +
        '<div class="grip"></div><div class="sh-ttl">ADJUST SCORE</div><div class="sh-sub">// MANUAL POINTS — NOT A FOUL //</div>' +
        '<div class="adj-tabs"><div class="adj-tab ' + (a.team === 0 ? 'on0' : '') + '" data-act="adjtab" data-team="0">' + esc(name0) + '</div><div class="adj-tab ' + (a.team === 1 ? 'on1' : '') + '" data-act="adjtab" data-team="1">' + esc(name1) + '</div></div>' +
        '<div class="adj-disp"><div class="adj-cur">CURRENT ' + cur + ' →</div><div class="adj-new">' + next + '</div><div class="adj-delta" style="color:' + deltaColor + '">' + deltaLabel + '</div></div>' +
        '<div class="adj-grid"><button class="adj-q minus" data-act="adj" data-d="-10">−10</button><button class="adj-q minus" data-act="adj" data-d="-1">−1</button><button class="adj-q plus" data-act="adj" data-d="1">+1</button><button class="adj-q plus" data-act="adj" data-d="10">+10</button></div>' +
        '<button class="apply-btn" style="background:linear-gradient(135deg,var(--g),#2fd585);color:#04130b;" data-act="adjapply">APPLY ADJUSTMENT</button>' +
        '<button class="sh-cancel" data-act="closeOverlay">CANCEL</button>' +
        '</div></div>';
    }
    function renderWinner() {
      const w = S.win || {};
      const n = [w.showRespot, w.showDraw, w.showNext, w.showDismiss].filter(Boolean).length + 2;
      const btnGrid = n >= 4 ? 'g2' : 'g3';
      const showGif = !!w.showGif && CONFIG.winnerGifs;
      let top = '';
      if (w.isDecider) top += '<div class="decider-flag">⚡ DECIDING FRAME ⚡</div>';
      if (w.showFrames) top += '<div class="mfs"><div class="mfs-s"><div class="mfs-n">' + esc(w.name0) + '</div><div class="mfs-f f0">' + w.frames0 + '</div><div class="mfs-t">' + esc(w.toWin) + '</div></div><div class="mfs-d">—</div><div class="mfs-s"><div class="mfs-n">' + esc(w.name1) + '</div><div class="mfs-f f1">' + w.frames1 + '</div><div class="mfs-t">' + esc(w.toWin) + '</div></div></div>';
      let gif = ''; if (showGif && w.gif) gif = '<div class="win-gif ' + (w.gifOudom ? 'oudom' : '') + '"><img src="' + esc(w.gif) + '" alt="celebration"></div>';
      let btns = '<button class="mb" data-act="winlobby">LOBBY</button><button class="mb sec" data-act="winstats">STATS</button>';
      if (w.showRespot) btns += '<button class="mb amb" data-act="winrespot">RE-SPOT BLACK</button>';
      if (w.showDraw) btns += '<button class="mb" data-act="windraw">ACCEPT DRAW</button>';
      if (w.showNext) btns += '<button class="mb pri" data-act="winnext">NEXT FRAME ▸</button>';
      if (w.showDismiss) btns += '<button class="mb pri" data-act="windismiss">DISMISS</button>';
      return '<div class="ov center"><div class="sheet c">' + top +
        '<div class="win-box"><div class="win-lb">' + esc(w.label) + '</div><div class="win-nm ' + (w.draw ? 'draw' : '') + '">' + esc(w.name) + '</div><div class="win-sc">' + esc(w.score) + '</div></div>' +
        gif +
        '<div class="mbtns ' + btnGrid + '">' + btns + '</div>' +
        '</div></div>';
    }
    function renderDelete() {
      const all = loadMatches(); const m = all[S.deleteCode];
      const label = m ? ((m.players && m.players[0]) || 'P1') + ' vs ' + ((m.players && m.players[1]) || 'P2') + ' · ' + S.deleteCode : (S.deleteCode || '');
      return '<div class="ov center"><div class="sheet c">' +
        '<div class="win-box"><div class="win-lb">// REMOVE MATCH //</div><div class="win-nm" style="font-size:18px;color:var(--red)">DELETE?</div><div class="win-sc" style="font-size:11px">' + esc(label) + '</div></div>' +
        '<div class="mbtns g2"><button class="mb" data-act="closeOverlay">CANCEL</button><button class="mb" style="border-color:rgba(255,93,84,.4);color:var(--red)" data-act="confirmDelete">DELETE</button></div>' +
        '</div></div>';
    }
    function renderEndMatch() {
      const G = S.G, pick = S.endMatchPick;
      const s0 = G.scores[0] || 0, s1 = G.scores[1] || 0;
      const lead0 = s0 > s1 ? 'LEADING' : (s0 < s1 ? 'BEHIND' : 'LEVEL');
      const lead1 = s1 > s0 ? 'LEADING' : (s1 < s0 ? 'BEHIND' : 'LEVEL');
      return '<div class="ov center" data-act="closeOverlay"><div class="sheet c" data-act="stop">' +
        '<div class="sh-ttl" style="color:var(--amber)">END MATCH NOW</div><div class="sh-sub">// CONCEDE — PICK THE WINNER //</div>' +
        '<div class="mfs"><div class="mfs-s"><div class="mfs-n">' + esc(G.players[0]) + '</div><div class="mfs-f f0">' + s0 + '</div><div class="mfs-t">' + lead0 + '</div></div><div class="mfs-d">—</div><div class="mfs-s"><div class="mfs-n">' + esc(G.players[1]) + '</div><div class="mfs-f f1">' + s1 + '</div><div class="mfs-t">' + lead1 + '</div></div></div>' +
        '<div class="foul-who" style="margin-bottom:14px">Tap the player who <b style="color:var(--amber)">WINS</b> the match. The other player concedes — no need to pot the remaining balls.</div>' +
        '<div class="mbtns g2" style="margin-bottom:9px"><button class="mb ' + (pick === 0 ? 'pri' : '') + '" data-act="empick" data-i="0">' + esc(G.players[0]) + ' WINS</button><button class="mb ' + (pick === 1 ? 'sec' : '') + '" data-act="empick" data-i="1">' + esc(G.players[1]) + ' WINS</button></div>' +
        '<button class="apply-btn" style="background:linear-gradient(135deg,var(--amber),#e0a800);color:#1a1400" data-act="emconfirm">✓ ' + esc(G.players[pick]) + ' WINS THE MATCH</button>' +
        '<button class="sh-cancel" data-act="closeOverlay">CANCEL</button>' +
        '</div></div>';
    }
    function renderAnalytics() {
      const G = S.G;
      const a = computeAnalyticsData(G) || { players: ['P1', 'P2'], scores: [0, 0], stats: [{ pots: 0, fouls: 0, misses: 0, ballCounts: {} }, { pots: 0, fouls: 0, misses: 0, ballCounts: {} }], totals: [0, 0] };
      const total = (a.scores[0] || 0) + (a.scores[1] || 0) || 1;
      const mp = Math.max(1, a.stats[0].pots, a.stats[1].pots), mf = Math.max(1, a.stats[0].fouls, a.stats[1].fouls), mm = Math.max(1, a.stats[0].misses, a.stats[1].misses);
      const pct = (i, k) => { const t = a.totals[i]; return t ? Math.round((a.stats[i][k] / t) * 100) + '%' : '0%'; };
      const mk = (label, k, max, asPct) => {
        const v0 = asPct ? pct(0, k) : a.stats[0][k], v1 = asPct ? pct(1, k) : a.stats[1][k];
        const w0 = (max ? Math.round((a.stats[0][k] / max) * 100) : 0) + '%', w1 = (max ? Math.round((a.stats[1][k] / max) * 100) : 0) + '%';
        return '<div class="an-stat"><div class="an-stat-l">' + label + '</div><div class="an-stat-rows">' +
          '<div class="an-stat-row"><div class="an-stat-row-n">' + esc(a.players[0]) + '</div><div class="an-rt"><div class="an-rf p0" style="width:' + w0 + '"></div></div><div class="an-stat-row-v">' + v0 + '</div></div>' +
          '<div class="an-stat-row"><div class="an-stat-row-n">' + esc(a.players[1]) + '</div><div class="an-rt"><div class="an-rf p1" style="width:' + w1 + '"></div></div><div class="an-stat-row-v">' + v1 + '</div></div>' +
          '</div></div>';
      };
      const stats = mk('POTS', 'pots', mp, false) + mk('POT %', 'pots', mp, true) + mk('FOULS', 'fouls', mf, false) + mk('FOUL %', 'fouls', mf, true) + mk('MISSES', 'misses', mm, false) + mk('MISS %', 'misses', mm, true);
      const balls = BALL_ORDER.map(b => '<div class="an-ball"><div class="an-ball-d" style="background:' + BALL_STYLES[b] + '">' + BALL_PTS[b] + '</div><div class="an-ball-l">' + b.slice(0, 3).toUpperCase() + '</div><div class="an-ball-c">' + ((a.stats[0].ballCounts[b] || 0) + (a.stats[1].ballCounts[b] || 0)) + '</div></div>').join('');
      return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">' +
        '<div class="grip"></div><div class="sh-ttl">MATCH ANALYTICS</div><div class="sh-sub">' + (G.phase === PHASE.ENDED ? '// POST-MATCH //' : '// LIVE //') + '</div>' +
        '<div class="an-bar"><div class="an-side"><div class="an-nm">' + esc(a.players[0]) + '</div><div class="an-v v0">' + a.scores[0] + '</div></div><div class="an-track"><div class="an-fill0" style="width:' + ((a.scores[0] / total) * 100) + '%"></div><div class="an-fill1" style="width:' + ((a.scores[1] / total) * 100) + '%"></div></div><div class="an-side"><div class="an-nm">' + esc(a.players[1]) + '</div><div class="an-v v1">' + a.scores[1] + '</div></div></div>' +
        '<div class="an-grid">' + stats + '</div>' +
        '<div class="an-slbl">// BALL BREAKDOWN</div><div class="an-balls">' + balls + '</div>' +
        '<button class="sh-cancel" data-act="closeOverlay">CLOSE</button>' +
        '</div></div>';
    }
    function renderConclusion() {
      const G = S.G; const frames = conclusionFrames();
      let body;
      if (!frames.length) { body = '<div class="conc-tabs"></div><div class="nomatch">NO FRAMES YET</div>'; }
      else {
        const idx = Math.min(S.conclusionFrame, frames.length - 1); const f = frames[idx];
        const tabs = frames.map((fr, i) => '<div class="conc-tab ' + (i === idx ? 'on' : '') + '" data-act="conctab" data-i="' + i + '">' + (fr.live ? 'LIVE' : 'FR ' + fr.frame) + '</div>').join('');
        const pl = f.players || G.players || ['P1', 'P2']; const p0 = pl[0] || 'P1', p1 = pl[1] || 'P2';
        const w = f.winner, mb = f.maxBreak || [0, 0], fc = f.foulCount || [0, 0], mfp = f.maxFoulPenalty || [0, 0], tp = f.totalPots || [0, 0];
        const bc = f.ballCounts || {}; const hb = Math.max(mb[0], mb[1]);
        const misses = [0, 1].map(i => (f.logs || []).filter(e => e.type === 'miss' && whoToTeam(e.who, pl) === i).length);
        const acc = [0, 1].map(i => { const t = (tp[i] || 0) + (misses[i] || 0) + (fc[i] || 0); return t ? Math.round(((tp[i] || 0) / t) * 100) : 0; });
        const card = (label, v0, v1, c0, c1) => '<div class="conc-card"><div class="conc-card-l">' + label + '</div><div class="conc-row"><div class="conc-row-p">' + esc(p0) + '</div><div class="conc-row-v ' + (c0 || '') + '">' + v0 + '</div></div><div class="conc-row"><div class="conc-row-p">' + esc(p1) + '</div><div class="conc-row-v ' + (c1 || '') + '">' + v1 + '</div></div></div>';
        const cards =
          card('// HIGHEST BREAK', mb[0] || 0, mb[1] || 0, mb[0] >= hb && mb[0] > 0 ? 'hi' : '', mb[1] >= hb && mb[1] > 0 ? 'hi' : '') +
          card('// TOTAL POTS', tp[0] || 0, tp[1] || 0, tp[0] >= tp[1] && tp[0] > 0 ? 'hi' : '', tp[1] >= tp[0] && tp[1] > 0 ? 'hi' : '') +
          card('// TOTAL FOULS', fc[0] || 0, fc[1] || 0, fc[0] > 0 ? 'red' : '', fc[1] > 0 ? 'red' : '') +
          card('// ACCURACY %', acc[0] + '%', acc[1] + '%', acc[0] > acc[1] ? 'hi' : '', acc[1] > acc[0] ? 'hi' : '') +
          card('// MAX FOUL PTS', mfp[0] || 0, mfp[1] || 0, mfp[0] > 0 ? 'red' : '', mfp[1] > 0 ? 'red' : '') +
          card('// MISSES', misses[0] || 0, misses[1] || 0, 'blue', 'blue');
        const balls = BALL_ORDER.map(b => { const c0 = (bc[b] && bc[b][0]) || 0, c1 = (bc[b] && bc[b][1]) || 0, max = Math.max(1, c0 + c1); return '<div class="conc-bb-row"><div class="conc-bb-d" style="background:' + BALL_STYLES[b] + '">' + BALL_PTS[b] + '</div><div class="conc-bb-n">' + BALL_FULL[b] + '</div><div class="conc-bb-bars"><div class="conc-bb-w"><div class="conc-bb-t"><div class="conc-bb-f" style="background:var(--g);width:' + Math.round((c0 / max) * 100) + '%"></div></div></div><div class="conc-bb-c">' + c0 + '</div><div class="conc-bb-c" style="color:var(--c)">' + c1 + '</div><div class="conc-bb-w"><div class="conc-bb-t"><div class="conc-bb-f" style="background:var(--c);width:' + Math.round((c1 / max) * 100) + '%"></div></div></div></div></div>'; }).join('');
        const wName = w >= 0 ? ((pl[w]) || 'P' + (w + 1)) + ' WINS FRAME' : (f.live ? 'IN PROGRESS' : 'FRAME LEVEL');
        body = '<div class="conc-tabs">' + tabs + '</div>' +
          '<div class="conc-w"><div class="conc-w-l">' + (f.live ? 'LIVE FRAME' : 'FRAME ' + f.frame + ' RESULT') + '</div><div class="conc-w-n">' + esc(wName) + '</div><div class="conc-w-s">' + f.scores[0] + ' — ' + f.scores[1] + '</div></div>' +
          '<div class="conc-grid">' + cards + '</div>' +
          '<div><div class="conc-card-l">// BALL BREAKDOWN</div>' + balls +
          '<div style="display:flex;justify-content:space-between;padding:5px 0;margin-top:4px;"><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--g)">◀ ' + esc(p0) + '</div><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--c)">' + esc(p1) + ' ▶</div></div>' +
          '</div>';
      }
      return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">' +
        '<div class="grip"></div><div class="sh-ttl">MATCH SUMMARY</div>' + body +
        '<button class="sh-cancel" data-act="closeOverlay">CLOSE</button>' +
        '</div></div>';
    }

    /* =====================================================================
       EVENT WIRING — one delegated listener set on #app
       ===================================================================== */
    const app = document.getElementById('app');
    app.addEventListener('click', e => {
      const t = e.target.closest('[data-act]'); if (!t) return;
      const a = t.dataset.act, d = t.dataset;
      switch (a) {
        case 'stop': e.stopPropagation(); return;
        case 'create': onCreate(); break;
        case 'back': goLobby(); break;
        case 'join': joinByInput(); break;
        case 'copyPending': copyPending(); break;
        case 'namechip': fillName(d.name); break;
        case 'matchchip': fillMatchup(parseInt(d.i)); break;
        case 'settarget': setTarget(d.t); break;
        case 'toggleMute': toggleMute(); break;
        case 'toggleLang': toggleLang(); break;
        case 'restart': confirmRestart(); break;
        case 'share': share(); break;
        case 'openConc': openConclusion(); break;
        case 'openAnalytics': openAnalytics(); break;
        case 'open': joinMatch(d.code); break;
        case 'del': e.stopPropagation(); askDelete(d.code); break;
        case 'pot': onPot(d.colour, parseInt(d.pts)); break;
        case 'frame': pickFrames(parseInt(d.n)); break;
        case 'sub': pickSub(parseInt(d.team), parseInt(d.i)); break;
        case 'hcap': hcapAdj(parseInt(d.team), parseInt(d.d)); break;
        case 'start': onStart(); break;
        case 'miss': onMiss(); break;
        case 'foulopen': openFoul(); break;
        case 'endmatchopen': openEndMatch(); break;
        case 'undo': onUndo(); break;
        case 'adjustopen': openAdjust(); break;
        case 'foulpick': applyFoul(parseInt(d.pts), S.foul.redOn ? S.foul.redCount : 0); break;
        case 'applyfoul': applyFoulCustom(); break;
        case 'toggleRedFoul': toggleRedFoul(); break;
        case 'redminus': e.stopPropagation(); redMinus(); break;
        case 'redplus': e.stopPropagation(); redPlus(); break;
        case 'adjtab': adjSetTeam(parseInt(d.team)); break;
        case 'adj': adjAdd(parseInt(d.d)); break;
        case 'adjapply': adjApply(); break;
        case 'empick': emPick(parseInt(d.i)); break;
        case 'emconfirm': emConfirm(); break;
        case 'conctab': switchConc(parseInt(d.i)); break;
        case 'closeOverlay': closeOverlay(); break;
        case 'confirmDelete': confirmDelete(); break;
        case 'winlobby': closeOverlay(); firebaseStopListen(); goLobby(); break;
        case 'winstats': openConclusion(); break;
        case 'winrespot': onRespotBlack(); break;
        case 'windraw': onAcceptDraw(); break;
        case 'winnext': nextFrame(); break;
        case 'windismiss': closeOverlay(); break;
      }
    });
    app.addEventListener('focusin', e => { const k = e.target.dataset.fkey; if (k === 'p1' || k === 'p2') S.lastNameField = k; });
    app.addEventListener('input', e => {
      const k = e.target.dataset.fkey;
      if (k === 'p1') { S.su.p1 = e.target.value; render(); }
      else if (k === 'p2') { S.su.p2 = e.target.value; render(); }
      else if (k === 'foulcustom') { S.foul.custom = e.target.value; }   // no re-render: keep typing
    });
    app.addEventListener('change', e => {
      const k = e.target.dataset.fkey;
      if (k === 'reds') S.su.reds = parseInt(e.target.value);
      else if (k === 'break') S.su.breakFirst = parseInt(e.target.value);
    });
    app.addEventListener('keydown', e => {
      if (e.target.dataset.fkey === 'join' && e.key === 'Enter') joinByInput();
    });

    /* viewport (landscape/tablet) */
    function onResize() {
      const ls = window.innerWidth > window.innerHeight && window.innerWidth >= 680;
      if (ls !== S.viewport.landscape) { S.viewport.landscape = ls; render(); }
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);

    /* warm up voices (some browsers populate getVoices async) */
    if (window.speechSynthesis) { try { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => { }; } catch (e) { } }

    /* go */
    initRoute();
  </script>
</body>

</html>
