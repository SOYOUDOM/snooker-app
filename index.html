<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Snooker Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #06100b;
      --s1: #0b1812;
      --s2: #102019;
      --s3: #16291f;
      --bd: #193225;
      --bd2: #27513a;
      --hi: #eafff4;
      --mid: #84bda0;
      --low: #54836c;
      --g: #4dffa0;
      --gdim: rgba(77, 255, 160, .12);
      --gline: rgba(77, 255, 160, .28);
      --c: #39e0ff;
      --cdim: rgba(57, 224, 255, .12);
      --cline: rgba(57, 224, 255, .30);
      --amber: #ffcf4d;
      --red: #ff5d54;
      --info: #39e0ff;
      --b-red: #d8392b;
      --b-yellow: #f1c40f;
      --b-green: #27ae60;
      --b-brown: #9c5a26;
      --b-blue: #2b86c5;
      --b-pink: #ec4899;
      --b-black: #1a1a1a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--hi);
      font-family: 'Rajdhani', sans-serif;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .snk-root {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bot);
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(77, 255, 160, .06), transparent 60%), var(--bg);
    }

    .snk-root::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(77, 255, 160, .014) 3px, rgba(77, 255, 160, .014) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    .mono {
      font-family: 'Share Tech Mono', monospace;
    }

    .disp {
      font-family: 'Orbitron', monospace;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    input,
    select {
      font-family: 'Share Tech Mono', monospace;
    }

    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    * {
      scrollbar-width: none;
    }

    /* HEADER */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      border-bottom: 1px solid var(--bd);
      flex-shrink: 0;
      background: rgba(6, 16, 11, .85);
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .hdr-l {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .hdr-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
      filter: drop-shadow(0 0 7px rgba(77, 255, 160, .55));
    }

    .hdr-name {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--g);
    }

    .hdr-r {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .ic {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--bd2);
      border-radius: 9px;
      background: var(--s1);
      color: var(--mid);
      font-size: 15px;
      transition: .15s;
    }

    .ic:active {
      transform: scale(.92);
      background: var(--s2);
      color: var(--hi);
    }

    .ic.lang {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--g);
      width: auto;
      min-width: 36px;
      padding: 0 9px;
    }

    /* SCREEN WRAP */
    .scrn {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .pad {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* LOBBY */
    .lobby-hero {
      text-align: center;
      padding: 18px 0 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lobby-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(77, 255, 160, .5));
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(77, 255, 160, .3));
      }

      to {
        filter: drop-shadow(0 0 26px rgba(77, 255, 160, .75));
      }
    }

    .lobby-ttl {
      font-family: 'Orbitron', monospace;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 5px;
      color: var(--g);
      text-shadow: 0 0 24px rgba(77, 255, 160, .4);
      margin-top: 14px;
    }

    .lobby-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--low);
      letter-spacing: 3px;
      margin-top: 7px;
    }

    .seclbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--low);
      text-transform: uppercase;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .seclbl i {
      color: var(--g);
      font-size: 11px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--g), #2fd585);
      border-radius: 12px;
      color: #04130b;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      box-shadow: 0 6px 22px rgba(77, 255, 160, .28);
      transition: .18s;
    }

    .btn-primary:active {
      transform: scale(.97);
      filter: brightness(1.08);
    }

    .join-bar {
      display: flex;
      gap: 8px;
    }

    .join-in {
      flex: 1;
      padding: 14px;
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-radius: 10px;
      color: var(--hi);
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      outline: none;
    }

    .join-in:focus {
      border-color: var(--g);
      box-shadow: 0 0 0 3px var(--gdim);
    }

    .join-in::placeholder {
      color: var(--low);
    }

    .join-go {
      padding: 0 20px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 10px;
      color: var(--g);
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .join-go:active {
      background: var(--s3);
    }

    .mlist {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .mcard {
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-radius: 13px;
      padding: 13px 15px 13px 17px;
      position: relative;
      overflow: hidden;
      animation: cardin .3s ease;
    }

    .mcard::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--g);
    }

    .mcard.ended::before {
      background: var(--low);
    }

    .mcard-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 9px;
    }

    .mcard-names {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--hi);
      letter-spacing: .5px;
    }

    .mcard-score {
      font-family: 'Orbitron', monospace;
      font-size: 21px;
      font-weight: 900;
      color: var(--g);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .mcard.ended .mcard-score {
      color: var(--low);
    }

    .mcard-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--mid);
      background: var(--s3);
      padding: 3px 8px;
      border-radius: 5px;
    }

    .tag.code {
      color: var(--hi);
      font-family: 'Orbitron', monospace;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .tag.live {
      color: var(--g);
      border: 1px solid var(--gline);
      background: var(--gdim);
      animation: lp 2s infinite;
    }

    .tag.ended {
      color: var(--low);
      border: 1px solid var(--bd);
    }

    .mcard-del {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 13px;
      color: var(--low);
      padding: 5px 9px;
      border-radius: 7px;
      background: var(--s3);
      border: 1px solid var(--bd);
    }

    .mcard-del:active {
      color: var(--red);
      border-color: var(--red);
    }

    .nomatch {
      text-align: center;
      padding: 42px 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--low);
      letter-spacing: 2px;
      line-height: 2.1;
    }

    /* SETUP */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--mid);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      align-self: flex-start;
    }

    .back:active {
      color: var(--hi);
    }

    .setup-ttl {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--g);
    }

    .codebox {
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-radius: 12px;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .code-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--low);
    }

    .code-v {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--g);
      letter-spacing: 5px;
    }

    .code-cp {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--mid);
      background: var(--s3);
      border: 1px solid var(--bd2);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .code-cp:active {
      color: var(--g);
    }

    .fld-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--low);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .fin {
      width: 100%;
      padding: 13px 14px;
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-radius: 10px;
      color: var(--hi);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
      transition: .18s;
    }

    .fin:focus {
      border-color: var(--g);
      box-shadow: 0 0 0 3px var(--gdim);
    }

    .fin.p2:focus {
      border-color: var(--c);
      box-shadow: 0 0 0 3px var(--cdim);
    }

    select.fin {
      cursor: pointer;
    }

    select.fin option {
      background: #0b1812;
    }

    .panel {
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-radius: 12px;
      padding: 13px 15px;
    }

    .panel-ttl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--low);
      margin-bottom: 11px;
      text-transform: uppercase;
    }

    .frame-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .fopt {
      padding: 11px 4px;
      border-radius: 9px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      color: var(--mid);
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      transition: .15s;
    }

    .fopt .fo-n {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 900;
    }

    .fopt .fo-s {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      letter-spacing: .5px;
      color: var(--low);
    }

    .fopt.on {
      background: var(--gdim);
      border-color: var(--g);
      color: var(--g);
    }

    .fopt.on .fo-s {
      color: var(--gline);
    }

    .fopt:active {
      transform: scale(.94);
    }

    .subgrid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .subopt {
      padding: 9px 15px;
      border-radius: 9px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      color: var(--mid);
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .subopt.on {
      background: var(--gdim);
      border-color: var(--g);
      color: var(--g);
    }

    .subopt.on.c {
      background: var(--cdim);
      border-color: var(--c);
      color: var(--c);
    }

    .hcap-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .hcap-side {
      flex: 1;
    }

    .hcap-nm {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--low);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 10px;
      overflow: hidden;
    }

    .step b {
      flex: 1;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 900;
      color: var(--hi);
    }

    .step button {
      width: 38px;
      height: 40px;
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      color: var(--g);
      background: var(--s3);
    }

    .step button:active {
      background: var(--bd2);
    }

    .step.c button {
      color: var(--c);
    }

    /* ===== GAME ===== */
    .game {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .sync {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      flex-shrink: 0;
      color: var(--g);
      background: var(--gdim);
      border-bottom: 1px solid var(--gline);
    }

    .sync.off {
      color: var(--low);
      background: transparent;
      border-color: transparent;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--g);
      animation: lp 1.5s infinite;
    }

    .sync.off .sync-dot {
      background: var(--low);
      animation: none;
    }

    .fbanner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: var(--s1);
      border-bottom: 1px solid var(--bd);
      padding: 6px 14px;
      flex-shrink: 0;
    }

    .fpips {
      flex: 1;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .fpips.r {
      justify-content: flex-end;
    }

    .pip {
      width: 15px;
      height: 7px;
      border-radius: 3px;
      border: 1px solid var(--bd2);
      background: var(--s3);
      transition: .3s;
    }

    .pip.w0 {
      background: var(--g);
      border-color: var(--g);
      box-shadow: 0 0 7px rgba(77, 255, 160, .5);
    }

    .pip.w1 {
      background: var(--c);
      border-color: var(--c);
      box-shadow: 0 0 7px rgba(57, 224, 255, .5);
    }

    .fb-mid {
      text-align: center;
      padding: 0 14px;
      min-width: 92px;
    }

    .fb-sc {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 900;
      color: var(--hi);
      letter-spacing: 3px;
      line-height: 1;
    }

    .fb-lb {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      letter-spacing: 1.5px;
      color: var(--low);
      margin-top: 3px;
    }

    .gbody {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* turn bar */
    .turnbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 7px 14px;
      flex-shrink: 0;
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      letter-spacing: 2px;
      transition: .3s;
      border-bottom: 1px solid var(--bd);
    }

    .turnbar.t0 {
      background: linear-gradient(90deg, var(--gdim), transparent 70%);
      color: var(--g);
    }

    .turnbar.t1 {
      background: linear-gradient(270deg, var(--cdim), transparent 70%);
      color: var(--c);
    }

    .turnbar .ta {
      font-size: 18px;
      animation: nudge 1.1s ease-in-out infinite;
    }

    .turnbar.t1 .ta {
      transform: scaleX(-1);
    }

    .turnbar .tn {
      font-size: 15px;
    }

    .turnbar .tnext {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--low);
      font-weight: 400;
    }

    /* scoreboard */
    .sb {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      background: var(--s1);
      border-bottom: 1px solid var(--bd);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .sb.flash::after {
      content: '';
      position: absolute;
      inset: 0;
      animation: sflash .5s ease forwards;
      pointer-events: none;
    }

    .pside {
      padding: 10px 13px;
      position: relative;
      transition: .3s;
    }

    .pside.left {
      text-align: left;
    }

    .pside.right {
      text-align: right;
    }

    .pside.act0 {
      background: linear-gradient(180deg, var(--gdim), transparent);
    }

    .pside.act1 {
      background: linear-gradient(180deg, var(--cdim), transparent);
    }

    .ptag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--low);
      margin-bottom: 2px;
    }

    .pnm {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--mid);
      margin-bottom: 5px;
      line-height: 1.15;
      min-height: 14px;
    }

    .pside.act0 .pnm {
      color: var(--g);
    }

    .pside.act1 .pnm {
      color: var(--c);
    }

    .psub {
      display: inline-block;
      transition: .25s;
    }

    .psub.cur0 {
      color: var(--g);
      text-shadow: 0 0 11px rgba(77, 255, 160, .7);
      font-weight: 800;
    }

    .psub.cur1 {
      color: var(--c);
      text-shadow: 0 0 11px rgba(57, 224, 255, .7);
      font-weight: 800;
    }

    .psub.off {
      color: var(--low);
      font-size: .85em;
    }

    .pslash {
      color: var(--low);
      padding: 0 3px;
    }

    .psc {
      font-family: 'Orbitron', monospace;
      font-size: 46px;
      font-weight: 900;
      line-height: .95;
      color: var(--hi);
      letter-spacing: -2px;
    }

    .psc.bump {
      animation: bump .35s cubic-bezier(.34, 1.6, .64, 1);
    }

    .pbrk {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--low);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .pbrk b {
      font-weight: 700;
    }

    .pside.act0 .pbrk b {
      color: var(--g);
    }

    .pside.act1 .pbrk b {
      color: var(--c);
    }

    .score-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      border-left: 1px solid var(--bd);
      border-right: 1px solid var(--bd);
      gap: 6px;
    }

    .vs {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--low);
      letter-spacing: 2px;
    }

    .diff {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--mid);
      white-space: nowrap;
    }

    .score-edit {
      font-size: 11px;
      color: var(--low);
      border: 1px solid var(--bd2);
      border-radius: 6px;
      padding: 3px 7px;
      background: var(--s2);
    }

    .score-edit:active {
      color: var(--g);
    }

    /* status strip */
    .strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--bd);
      border-bottom: 1px solid var(--bd);
      flex-shrink: 0;
    }

    .cell {
      background: var(--bg);
      padding: 9px 4px;
      text-align: center;
    }

    .cell-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--low);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .cell-v {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--hi);
    }

    .cell-v.ph {
      color: var(--g);
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* snooker status */
    .snk-st {
      padding: 7px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-align: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--bd);
    }

    .snk-st b {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
    }

    .snk-st.warn {
      background: rgba(255, 207, 77, .08);
      color: var(--amber);
    }

    .snk-st.dead {
      background: rgba(255, 93, 84, .08);
      color: var(--red);
    }

    /* balls */
    .ball-sec {
      padding: 10px 12px 9px;
      flex-shrink: 0;
    }

    .minilbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--low);
      text-transform: uppercase;
      margin-bottom: 9px;
    }

    .ball-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .ball {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: .13s;
      box-shadow: inset 0 -5px 9px rgba(0, 0, 0, .6), inset 0 2px 4px rgba(255, 255, 255, .22), 0 3px 9px rgba(0, 0, 0, .5);
    }

    .ball::after {
      content: '';
      position: absolute;
      top: 12%;
      left: 18%;
      width: 30%;
      height: 24%;
      background: rgba(255, 255, 255, .4);
      border-radius: 50%;
      transform: rotate(-35deg);
    }

    .ball .bp {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, .85);
      line-height: 1;
      z-index: 2;
    }

    .ball .bn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 6px;
      letter-spacing: .4px;
      color: rgba(255, 255, 255, .8);
      z-index: 2;
      margin-top: 1px;
    }

    .ball:active {
      transform: scale(.86);
      box-shadow: inset 0 -2px 4px rgba(0, 0, 0, .6), 0 0 22px rgba(77, 255, 160, .5);
    }

    .ball.dis {
      opacity: .2;
      pointer-events: none;
      filter: grayscale(.8);
    }

    .b-red {
      background: radial-gradient(circle at 38% 32%, #e74c3c, var(--b-red) 50%, #7b0000);
    }

    .b-yellow {
      background: radial-gradient(circle at 38% 32%, #f9e34a, var(--b-yellow) 50%, #8a6d00);
    }

    .b-green {
      background: radial-gradient(circle at 38% 32%, #52d68a, var(--b-green) 50%, #145a32);
    }

    .b-brown {
      background: radial-gradient(circle at 38% 32%, #c0714a, var(--b-brown) 50%, #3d1a05);
    }

    .b-blue {
      background: radial-gradient(circle at 38% 32%, #5dade2, var(--b-blue) 50%, #154360);
    }

    .b-pink {
      background: radial-gradient(circle at 38% 32%, #f48fb1, var(--b-pink) 50%, #880040);
    }

    .b-black {
      background: radial-gradient(circle at 38% 32%, #4a4a4a, #222 50%, #000);
    }

    /* actions */
    .act-sec {
      padding: 4px 12px 8px;
      flex-shrink: 0;
    }

    .act-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }

    .act {
      padding: 11px 4px;
      border-radius: 11px;
      border: 1px solid var(--bd2);
      background: var(--s1);
      color: var(--mid);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: .5px;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: .14s;
    }

    .act i {
      font-size: 17px;
    }

    .act:active {
      transform: scale(.94);
      background: var(--s2);
    }

    .act.miss {
      border-color: rgba(255, 207, 77, .35);
      color: var(--amber);
    }

    .act.foul {
      border-color: rgba(255, 93, 84, .35);
      color: var(--red);
    }

    .act.undo {
      border-color: var(--cline);
      color: var(--c);
    }

    .act.endm {
      border-color: rgba(255, 207, 77, .35);
      color: var(--amber);
    }

    /* log */
    .log-sec {
      flex: 1;
      padding: 0 12px 8px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .le {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 7px 11px;
      background: var(--s1);
      border-left: 3px solid var(--bd2);
      border-radius: 5px;
      flex-shrink: 0;
    }

    .le.foul {
      border-left-color: var(--red);
    }

    .le.miss {
      border-left-color: var(--amber);
    }

    .le.pot {
      border-left-color: var(--g);
    }

    .le.system {
      border-left-color: var(--c);
    }

    .le.adjust {
      border-left-color: var(--info);
    }

    .le-ts {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--low);
      white-space: nowrap;
    }

    .le-tx {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--mid);
    }

    .le-pt {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--hi);
      white-space: nowrap;
    }

    /* OVERLAYS */
    .ov {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 5, .9);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 500;
      animation: fade .2s;
      padding-bottom: var(--safe-bot);
      backdrop-filter: blur(3px);
    }

    .ov.center {
      align-items: center;
    }

    .sheet {
      background: var(--s1);
      border: 1px solid var(--bd2);
      border-top-color: var(--gline);
      border-radius: 22px 22px 0 0;
      padding: 18px 16px 22px;
      width: 100%;
      max-width: 520px;
      animation: slideup .3s cubic-bezier(.34, 1.2, .64, 1);
      max-height: 92dvh;
      overflow-y: auto;
    }

    .sheet.c {
      border-radius: 18px;
      width: 90%;
      max-width: 400px;
      animation: scalein .25s cubic-bezier(.34, 1.3, .64, 1);
    }

    .grip {
      width: 42px;
      height: 4px;
      background: var(--bd2);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .sh-ttl {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--g);
      text-align: center;
      margin-bottom: 4px;
    }

    .sh-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--low);
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .sh-cancel {
      width: 100%;
      padding: 14px;
      border-radius: 11px;
      border: 1px solid var(--bd);
      background: var(--s2);
      color: var(--mid);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 6px;
    }

    .sh-cancel:active {
      background: var(--s3);
      color: var(--hi);
    }

    /* foul */
    .foul-who {
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--mid);
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .foul-who b {
      color: var(--red);
      font-family: 'Orbitron', monospace;
    }

    .foul-who .arr {
      color: var(--low);
      padding: 0 6px;
    }

    .foul-who .opp {
      color: var(--g);
      font-family: 'Orbitron', monospace;
    }

    .foul-opts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-bottom: 12px;
    }

    .fo {
      padding: 15px 6px;
      border-radius: 11px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      color: var(--red);
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
      transition: .14s;
    }

    .fo small {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      color: var(--low);
      letter-spacing: 1px;
    }

    .fo.on {
      background: rgba(255, 93, 84, .16);
      border-color: var(--red);
    }

    .fo:active {
      transform: scale(.93);
    }

    .foul-cust {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .foul-cust input {
      flex: 1;
      padding: 13px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 11px;
      color: var(--red);
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      outline: none;
      -webkit-appearance: none;
    }

    .foul-cust button {
      padding: 0 20px;
      border-radius: 11px;
      border: 1px solid rgba(255, 93, 84, .4);
      background: rgba(255, 93, 84, .12);
      color: var(--red);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 11px;
      padding: 11px 14px;
      margin-bottom: 12px;
    }

    .toggle-row.on {
      border-color: var(--red);
      background: rgba(255, 93, 84, .07);
    }

    .toggle-lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--mid);
      line-height: 1.4;
    }

    .toggle-lbl b {
      color: var(--red);
      font-size: 11px;
      display: block;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .tg {
      width: 48px;
      height: 28px;
      border-radius: 14px;
      background: var(--s3);
      border: 1px solid var(--bd2);
      position: relative;
      flex-shrink: 0;
      transition: .2s;
    }

    .tg::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--low);
      transition: .2s;
    }

    .tg.on {
      background: rgba(255, 93, 84, .25);
      border-color: var(--red);
    }

    .tg.on::after {
      left: 23px;
      background: var(--red);
    }

    .redrem {
      background: rgba(255, 93, 84, .06);
      border: 1px solid rgba(255, 93, 84, .25);
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 12px;
    }

    .redrem-t {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--red);
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-align: center;
    }

    .redrem-step {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .redrem-step button {
      width: 44px;
      height: 44px;
      border-radius: 9px;
      border: 1px solid rgba(255, 93, 84, .4);
      background: rgba(255, 93, 84, .12);
      color: var(--red);
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
    }

    .redrem-step .rv {
      font-family: 'Orbitron', monospace;
      font-size: 30px;
      font-weight: 900;
      color: var(--red);
      padding: 0 22px;
    }

    .apply-btn {
      width: 100%;
      padding: 15px;
      border-radius: 11px;
      border: none;
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
      box-shadow: 0 5px 18px rgba(255, 93, 84, .3);
    }

    .apply-btn:active {
      transform: scale(.97);
    }

    /* adjust */
    .adj-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .adj-tab {
      flex: 1;
      padding: 11px;
      border-radius: 11px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--mid);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .adj-tab.on0 {
      background: var(--gdim);
      border-color: var(--g);
      color: var(--g);
    }

    .adj-tab.on1 {
      background: var(--cdim);
      border-color: var(--c);
      color: var(--c);
    }

    .adj-disp {
      text-align: center;
      margin-bottom: 14px;
    }

    .adj-cur {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--low);
      letter-spacing: 1px;
    }

    .adj-new {
      font-family: 'Orbitron', monospace;
      font-size: 40px;
      font-weight: 900;
      color: var(--hi);
      line-height: 1.1;
    }

    .adj-delta {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
    }

    .adj-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .adj-q {
      padding: 13px 4px;
      border-radius: 10px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      color: var(--hi);
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
    }

    .adj-q:active {
      transform: scale(.93);
      background: var(--s3);
    }

    .adj-q.minus {
      color: var(--red);
    }

    .adj-q.plus {
      color: var(--g);
    }

    /* winner */
    .mfs {
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
    }

    .mfs-s {
      flex: 1;
      text-align: center;
    }

    .mfs-n {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--low);
      letter-spacing: 1px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mfs-f {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .mfs-f.f0 {
      color: var(--g);
    }

    .mfs-f.f1 {
      color: var(--c);
    }

    .mfs-d {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: var(--low);
      padding: 0 14px;
    }

    .mfs-t {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      color: var(--low);
      letter-spacing: 1px;
      margin-top: 3px;
    }

    .win-box {
      text-align: center;
      padding: 6px 0 14px;
    }

    .win-lb {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--low);
      margin-bottom: 8px;
    }

    .win-nm {
      font-family: 'Orbitron', monospace;
      font-size: 25px;
      font-weight: 900;
      color: var(--g);
      letter-spacing: 1px;
      margin-bottom: 5px;
      animation: wpop .5s cubic-bezier(.34, 1.6, .64, 1);
      line-height: 1.1;
    }

    .win-nm.draw {
      color: var(--amber);
    }

    .win-sc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      color: var(--mid);
      letter-spacing: 3px;
    }

    .win-gif {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid rgba(255, 255, 255, .3);
      box-shadow: 0 0 22px rgba(185, 185, 184, .3);
    }

    .win-gif.oudom {
      border-color: gold;
      box-shadow: 0 0 24px rgba(255, 215, 0, .45);
    }

    .win-gif img {
      width: 100%;
      height: 160px;
      object-fit: fill;
      display: block;
    }

    .mbtns {
      display: grid;
      gap: 9px;
    }

    .mbtns.g2 {
      grid-template-columns: 1fr 1fr;
    }

    .mbtns.g3 {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .mb {
      padding: 15px 6px;
      border-radius: 11px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      color: var(--hi);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-align: center;
    }

    .mb:active {
      background: var(--s3);
    }

    .mb.pri {
      background: var(--gdim);
      border-color: var(--g);
      color: var(--g);
    }

    .mb.sec {
      background: var(--cdim);
      border-color: var(--c);
      color: var(--c);
    }

    .mb.amb {
      background: rgba(255, 207, 77, .1);
      border-color: rgba(255, 207, 77, .4);
      color: var(--amber);
    }

    .decider-flag {
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--amber);
      background: rgba(255, 207, 77, .1);
      border: 1px solid rgba(255, 207, 77, .3);
      border-radius: 9px;
      padding: 8px;
      margin-bottom: 12px;
      animation: lp 1.6s infinite;
    }

    /* analytics */
    .an-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 11px;
      margin-bottom: 16px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 12px;
      padding: 13px;
    }

    .an-side {
      text-align: center;
      min-width: 54px;
    }

    .an-nm {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--low);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 64px;
    }

    .an-v {
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .an-v.v0 {
      color: var(--g);
    }

    .an-v.v1 {
      color: var(--c);
    }

    .an-track {
      height: 9px;
      border-radius: 5px;
      background: var(--bd);
      display: flex;
      overflow: hidden;
    }

    .an-fill0 {
      background: linear-gradient(90deg, var(--g), rgba(77, 255, 160, .5));
      transition: width .5s;
    }

    .an-fill1 {
      background: linear-gradient(90deg, rgba(57, 224, 255, .5), var(--c));
      transition: width .5s;
    }

    .an-slbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--low);
      margin: 14px 0 10px;
    }

    .an-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .an-stat {
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 11px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .an-stat-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--low);
      text-transform: uppercase;
    }

    .an-stat-rows {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .an-stat-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .an-stat-row-n {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--mid);
      width: 42px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .an-rt {
      flex: 1;
      height: 6px;
      background: var(--bd);
      border-radius: 3px;
      overflow: hidden;
    }

    .an-rf {
      height: 100%;
      border-radius: 3px;
      transition: width .6s;
    }

    .an-rf.p0 {
      background: var(--g);
    }

    .an-rf.p1 {
      background: var(--c);
    }

    .an-stat-row-v {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--hi);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    .an-balls {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .an-ball {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .an-ball-d {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      box-shadow: inset 0 -3px 6px rgba(0, 0, 0, .5), inset 0 2px 4px rgba(255, 255, 255, .2);
      position: relative;
    }

    .an-ball-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: var(--low);
    }

    .an-ball-c {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--hi);
    }

    /* conclusion */
    .conc-w {
      text-align: center;
      padding: 11px;
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 11px;
      margin-bottom: 12px;
    }

    .conc-w-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--low);
      margin-bottom: 4px;
    }

    .conc-w-n {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 900;
      color: var(--g);
      letter-spacing: 1px;
    }

    .conc-w-s {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--mid);
      letter-spacing: 2px;
      margin-top: 3px;
    }

    .conc-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 13px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .conc-tab {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 9px;
      border: 1px solid var(--bd2);
      background: var(--s2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--low);
      white-space: nowrap;
    }

    .conc-tab.on {
      background: var(--gdim);
      border-color: var(--g);
      color: var(--g);
    }

    .conc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .conc-card {
      background: var(--s2);
      border: 1px solid var(--bd2);
      border-radius: 11px;
      padding: 12px;
    }

    .conc-card-l {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--low);
      margin-bottom: 8px;
    }

    .conc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .conc-row-p {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 64px;
    }

    .conc-row-v {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--hi);
    }

    .conc-row-v.hi {
      color: var(--g);
    }

    .conc-row-v.red {
      color: var(--red);
    }

    .conc-row-v.blue {
      color: var(--c);
    }

    .conc-bb-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--bd);
    }

    .conc-bb-d {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      font-weight: 900;
      color: #fff;
    }

    .conc-bb-n {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--mid);
      flex: 1;
      letter-spacing: 1px;
    }

    .conc-bb-bars {
      display: flex;
      gap: 5px;
      align-items: center;
      flex: 2;
    }

    .conc-bb-w {
      flex: 1;
    }

    .conc-bb-t {
      height: 5px;
      background: var(--bd);
      border-radius: 3px;
      overflow: hidden;
    }

    .conc-bb-f {
      height: 100%;
      border-radius: 3px;
    }

    .conc-bb-c {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--hi);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    /* toast */
    .toast {
      position: fixed;
      top: calc(var(--safe-top) + 58px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--s3);
      border: 1px solid var(--bd2);
      border-radius: 20px;
      padding: 9px 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--g);
      z-index: 9998;
      white-space: nowrap;
      animation: toastin .3s cubic-bezier(.34, 1.3, .64, 1);
      pointer-events: none;
    }

    .toast.warn {
      color: var(--amber);
    }

    .toast.err {
      color: var(--red);
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9990;
    }

    /* keyframes */
    @keyframes lp {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    @keyframes nudge {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(4px);
      }
    }

    @keyframes slidein {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes cardin {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes slideup {
      from {
        transform: translateY(60px);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes scalein {
      from {
        opacity: 0;
        transform: scale(.88);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes bump {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.18);
      }

      70% {
        transform: scale(.96);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes sflash {
      0% {
        background: rgba(77, 255, 160, 0);
      }

      20% {
        background: rgba(77, 255, 160, .08);
      }

      100% {
        background: rgba(77, 255, 160, 0);
      }
    }

    @keyframes wpop {
      0% {
        transform: scale(0);
        opacity: 0;
      }

      60% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes toastin {
      from {
        opacity: 0;
        transform: translate(-50%, -10px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* ===== LANDSCAPE = two columns (balls left, log right) like the desktop view =====
   Triggers on ANY landscape ≥680px wide — including a phone on its side. The left
   column flexes so balls + actions stay fully visible; the log scrolls on the right. */
    @media (orientation:landscape) and (min-width:680px) {
      .gbody.land {
        display: grid;
        grid-template-columns: 1.12fr .88fr;
        grid-template-rows: auto 1fr;
        gap: 0;
        overflow: hidden;
      }

      .gbody.land .turnbar {
        grid-column: 1 / -1;
      }

      .gbody.land .land-left {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        border-right: 1px solid var(--bd);
      }

      .gbody.land .land-right {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .gbody.land .psc {
        font-size: 54px;
      }

      .gbody.land .ball .bp {
        font-size: 16px;
      }
    }

    /* TALL landscape (tablet / desktop) — let the scores breathe */
    @media (orientation:landscape) and (min-width:680px) and (min-height:640px) {
      .gbody.land .psc {
        font-size: 60px;
      }
    }

    /* SHORT landscape (phone on its side, ~360–540px tall) — compact every block so the
   balls and action buttons are fully visible with no scrolling. */
    @media (orientation:landscape) and (min-width:680px) and (max-height:540px) {
      .hdr {
        padding: 5px 12px;
      }

      .hdr-logo {
        width: 21px;
        height: 21px;
      }

      .hdr-name {
        font-size: 11px;
        letter-spacing: 3px;
      }

      .hdr .ic {
        width: 31px;
        height: 31px;
        font-size: 13px;
      }

      .hdr .ic.lang {
        font-size: 10px;
      }

      .game>.sync {
        padding: 2px 12px;
        font-size: 9px;
      }

      .game>.fbanner {
        padding: 3px 14px;
      }

      .gbody.land .turnbar {
        padding: 3px 14px;
      }

      .gbody.land .turnbar .tn {
        font-size: 13px;
      }

      .gbody.land .turnbar .ta {
        font-size: 14px;
      }

      .gbody.land .turnbar .tnext {
        font-size: 8px;
      }

      .gbody.land .pside {
        padding: 4px 12px;
      }

      .gbody.land .ptag {
        margin-bottom: 0;
        font-size: 8px;
      }

      .gbody.land .pnm {
        font-size: 11px;
        margin-bottom: 1px;
        min-height: 0;
      }

      .gbody.land .psc {
        font-size: 30px;
        letter-spacing: -1px;
      }

      .gbody.land .pbrk {
        margin-top: 0;
        font-size: 9px;
      }

      .gbody.land .score-mid {
        padding: 0 9px;
        gap: 3px;
      }

      .gbody.land .vs {
        font-size: 10px;
      }

      .gbody.land .score-edit {
        padding: 2px 6px;
        font-size: 10px;
      }

      .gbody.land .strip .cell {
        padding: 3px 4px;
      }

      .gbody.land .strip .cell-l {
        margin-bottom: 1px;
        font-size: 8px;
      }

      .gbody.land .strip .cell-v {
        font-size: 12px;
      }

      .gbody.land .snk-st {
        padding: 3px 12px;
        font-size: 9px;
      }

      .gbody.land .ball-sec {
        padding: 4px 10px;
      }

      .gbody.land .ball-sec .minilbl {
        margin-bottom: 4px;
      }

      .gbody.land .ball-grid {
        gap: 6px;
      }

      .gbody.land .ball {
        border-width: 1.5px;
      }

      .gbody.land .ball .bp {
        font-size: 13px;
      }

      .gbody.land .ball .bn {
        font-size: 5px;
        margin-top: 0;
      }

      .gbody.land .act-sec {
        padding: 3px 10px 6px;
      }

      .gbody.land .act {
        padding: 6px 4px;
        font-size: 8px;
        gap: 3px;
      }

      .gbody.land .act i {
        font-size: 14px;
      }

      .gbody.land .land-right .minilbl {
        margin: 5px 0;
      }

      .gbody.land .le {
        padding: 5px 9px;
      }
    }

    /* VERY short (small phones on their side, <400px tall) — squeeze a little more */
    @media (orientation:landscape) and (min-width:680px) and (max-height:400px) {
      .hdr {
        padding: 4px 11px;
      }

      .gbody.land .pnm {
        font-size: 10px;
      }

      .gbody.land .psc {
        font-size: 26px;
      }

      .gbody.land .ball .bp {
        font-size: 12px;
      }

      .gbody.land .strip .cell-v {
        font-size: 11px;
      }

      .gbody.land .act {
        padding: 5px 4px;
      }

      .gbody.land .act i {
        font-size: 13px;
      }
    }

    @media (min-width:760px) {
      .pad {
        max-width: 620px;
        margin: 0 auto;
        width: 100%;
      }

      .sheet {
        max-width: 620px;
      }
    }

    @media (max-width:360px) {
      .psc {
        font-size: 38px;
      }

      .ball .bp {
        font-size: 12px;
      }

      .ball .bn {
        font-size: 5px;
      }

      .ball-grid {
        gap: 6px;
      }

      .an-grid,
      .conc-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function esc(s) { return ('' + (s == null ? '' : s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

    function toast(msg, type) {
      // direct DOM — never triggers a full re-render (avoids score-tap glitch)
      let el = document.getElementById('snk-toast'); if (el) el.remove();
      el = document.createElement('div'); el.id = 'snk-toast'; el.className = 'toast ' + (type || ''); el.textContent = msg;

    function getActiveName(G, ti) { const subs = getSubPlayers(G, ti); if (subs.length <= 1) return subs[0]; const sp = G.subPlayer || [0, 0]; return subs[sp[ti] % subs.length]; }

    /* ---------- localStorage ---------- */
    function loadMatches() { try { return JSON.parse(localStorage.getItem(LS) || '{}'); } catch (e) { return {}; } }
    function pruneMatches(all) {
      const now = Date.now();
      for (const c of Object.keys(all)) if (all[c].phase === PHASE.ENDED && (now - (all[c].updatedAt || 0)) > 7 * 864e5) delete all[c];
      let codes = Object.keys(all);
      if (codes.length > 24) {
        const sorted = codes.sort((a, b) => (all[a].updatedAt || 0) - (all[b].updatedAt || 0));
        const ordered = [...sorted.filter(c => all[c].phase === PHASE.ENDED), ...sorted.filter(c => all[c].phase !== PHASE.ENDED)];
        while (Object.keys(all).length > 24 && ordered.length) delete all[ordered.shift()];
      }
      return all;

    function packState(G) { return { ...G, history: (G.history || []).slice(-20), logs: (G.logs || []).slice(0, 50) }; }
    function saveMatch(code, G) {
      let all = loadMatches();
      all[code] = { ...packState(G), updatedAt: G.updatedAt || Date.now() };
      all = pruneMatches(all);

      catch (e) {

        try { localStorage.setItem(LS, JSON.stringify(clean)); } catch (_) { }
        toast('STORAGE FULL', 'err');

    function rememberNames() {
      // store each individual player (split doubles on "/"), most-recent first, capped at 24
      let list = loadNames();
      const incoming = [];
      [S.su.p1, S.su.p2].forEach(raw => { (raw || '').split('/').forEach(n => { const v = n.trim(); if (v) incoming.push(v); }); });

      list = list.slice(0, 24);
      try { localStorage.setItem(LS_NAMES, JSON.stringify(list)); } catch (e) { }
      // remember the FULL matchup (keeps doubles teams intact) for one-tap “play again”

      let f = 0; const draw = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); pieces.forEach(p => { p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += .05; p.life -= .006; ctx.save(); ctx.globalAlpha = Math.max(0, p.life); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180); ctx.fillStyle = p.c; ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r); ctx.restore(); }); f++; if (f < 200) requestAnimationFrame(draw); else ctx.clearRect(0, 0, canvas.width, canvas.height); }; draw();

    /* ---------- analytics math ---------- */
    function whoToTeam(who, players) { if (!who || !players) return -1; const w = ('' + who).toUpperCase(); for (let i = 0; i < players.length; i++) { const p = (players[i] || '').toUpperCase(); if (p === w) return i; const subs = p.split('/').map(s => s.trim()); if (subs.includes(w)) return i; } return -1; }
    function computeMaxBreak(logs, players) { const pl = players || []; const r = [0, 0]; if (!logs || !logs.length) return r; let cp = -1, cb = 0;[...logs].reverse().forEach(e => { if (e.type === 'pot') { const pi = whoToTeam(e.who, pl); if (pi < 0) return; if (pi !== cp) { if (cp >= 0 && cb > r[cp]) r[cp] = cb; cp = pi; cb = 0; } cb += parseInt((e.pts || '0').replace(/[^0-9]/g, '')) || 0; } else if (e.type === 'miss' || e.type === 'foul') { if (cp >= 0 && cb > r[cp]) r[cp] = cb; cp = -1; cb = 0; } }); if (cp >= 0 && cb > r[cp]) r[cp] = cb; return r; }
    function computeTotalPots(logs, players) { const pl = players || []; const r = [0, 0]; if (!logs) return r; logs.forEach(e => { if (e.type === 'pot') { const pi = whoToTeam(e.who, pl); if (pi >= 0) r[pi]++; } }); return r; }
    function computeBallCounts(logs, players) { const pl = players || []; const r = { red: [0, 0], yellow: [0, 0], green: [0, 0], brown: [0, 0], blue: [0, 0], pink: [0, 0], black: [0, 0] }; if (!logs) return r; logs.forEach(e => { if (e.type === 'pot') { const pi = whoToTeam(e.who, pl); if (pi < 0) return; const b = (e.action || '').replace('POTS ', '').toLowerCase().replace(/[^a-z]/g, ''); if (r[b]) r[b][pi]++; } }); return r; }
    function computeAnalyticsData(g) {
      if (!g || !g.logs) return null; const pl = g.players || [];
      const stats = [{ pots: 0, fouls: 0, misses: 0, ballCounts: { red: 0, yellow: 0, green: 0, brown: 0, blue: 0, pink: 0, black: 0 } }, { pots: 0, fouls: 0, misses: 0, ballCounts: { red: 0, yellow: 0, green: 0, brown: 0, blue: 0, pink: 0, black: 0 } }];
      g.logs.forEach(e => { const pi = whoToTeam(e.who, pl); if (pi < 0) return; if (e.type === 'pot') { stats[pi].pots++; const b = (e.action || '').replace('POTS ', '').toLowerCase().replace(/[^a-z]/g, ''); if (stats[pi].ballCounts[b] !== undefined) stats[pi].ballCounts[b]++; } else if (e.type === 'foul') stats[pi].fouls++; else if (e.type === 'miss') stats[pi].misses++; });
      return { players: [pl[0] || 'P1', pl[1] || 'P2'], scores: g.scores || [0, 0], stats, totals: [0, 1].map(i => stats[i].pots + stats[i].fouls + stats[i].misses) };
    }

    /* ---------- snooker situation ---------- */
    function calcSnooker(s) {
      if (s.phase === PHASE.ENDED) return { status: 'ended' };
      const pl = calcPointsLeft(s); const s0 = s.scores[0] || 0, s1 = s.scores[1] || 0;
      if (s0 === s1) return { status: 'level', ptsLeft: pl };
      const leader = s0 > s1 ? 0 : 1, trailer = 1 - leader, diff = Math.abs(s0 - s1);
      if (diff <= pl) return { status: 'open', leader, trailer, diff, ptsLeft: pl };
      const snookersNeeded = Math.ceil((diff - pl) / 4);
      const ballsLeft = s.phase === PHASE.REDS ? (s.redsRemaining + 6) : (COLOR_ORDER.length - (s.colourIndex || 0));
      const frameDecided = diff > pl + (ballsLeft * 7);
      return { status: frameDecided ? 'decided' : 'snookers', leader, trailer, diff, ptsLeft: pl, snookersNeeded, ballsLeft };
    }

    function captureFocus() {
      const el = document.activeElement;
      if (el && el.dataset && el.dataset.fkey) {
        let start = null, end = null; try { start = el.selectionStart; end = el.selectionEnd; } catch (e) { }
        return { key: el.dataset.fkey, start, end };
      }
      return null;
    }
    function restoreFocus(f) {
      if (!f) return;
      const el = document.querySelector('[data-fkey="' + f.key + '"]');
      if (el) { try { el.focus(); if (f.start != null) el.setSelectionRange(f.start, f.end); } catch (e) { } }
    }
