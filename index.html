<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Snooker Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#06100b; --s1:#0b1812; --s2:#102019; --s3:#16291f;
  --bd:#193225; --bd2:#27513a;
  --hi:#eafff4; --mid:#84bda0; --low:#54836c;
  --g:#4dffa0; --gdim:rgba(77,255,160,.12); --gline:rgba(77,255,160,.28);
  --c:#39e0ff; --cdim:rgba(57,224,255,.12); --cline:rgba(57,224,255,.30);
  --amber:#ffcf4d; --red:#ff5d54; --info:#39e0ff;
  --b-red:#d8392b; --b-yellow:#f1c40f; --b-green:#27ae60; --b-brown:#9c5a26;
  --b-blue:#2b86c5; --b-pink:#ec4899; --b-black:#1a1a1a;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--hi);font-family:'Rajdhani',sans-serif;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.snk-root{height:100dvh;display:flex;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);overflow:hidden;position:relative;background:
  radial-gradient(120% 80% at 50% -10%,rgba(77,255,160,.06),transparent 60%),var(--bg);}
.snk-root::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(77,255,160,.014) 3px,rgba(77,255,160,.014) 4px);pointer-events:none;z-index:9999;}
.mono{font-family:'Share Tech Mono',monospace;}
.disp{font-family:'Orbitron',monospace;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:'Share Tech Mono',monospace;}
::-webkit-scrollbar{width:0;height:0;}
*{scrollbar-width:none;}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(6,16,11,.85);backdrop-filter:blur(6px);z-index:5;}
.hdr-l{display:flex;align-items:center;gap:9px;}
.hdr-logo{width:26px;height:26px;object-fit:contain;filter:drop-shadow(0 0 7px rgba(77,255,160,.55));}
.hdr-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:4px;color:var(--g);}
.hdr-r{display:flex;gap:7px;align-items:center;}
.ic{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd2);border-radius:9px;background:var(--s1);color:var(--mid);font-size:15px;transition:.15s;}
.ic:active{transform:scale(.92);background:var(--s2);color:var(--hi);}
.ic.lang{font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--g);width:auto;min-width:36px;padding:0 9px;}

/* SCREEN WRAP */
.scrn{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;}
.pad{padding:16px;display:flex;flex-direction:column;gap:14px;}

/* LOBBY */
.lobby-hero{text-align:center;padding:18px 0 8px;display:flex;flex-direction:column;align-items:center;}
.lobby-logo{width:84px;height:84px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(77,255,160,.5));animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{filter:drop-shadow(0 0 10px rgba(77,255,160,.3));}to{filter:drop-shadow(0 0 26px rgba(77,255,160,.75));}}
.lobby-ttl{font-family:'Orbitron',monospace;font-size:21px;font-weight:900;letter-spacing:5px;color:var(--g);text-shadow:0 0 24px rgba(77,255,160,.4);margin-top:14px;}
.lobby-sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--low);letter-spacing:3px;margin-top:7px;}
.seclbl{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--low);text-transform:uppercase;padding-bottom:9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.seclbl i{color:var(--g);font-size:11px;}
.btn-primary{width:100%;padding:16px;background:linear-gradient(135deg,var(--g),#2fd585);border-radius:12px;color:#04130b;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:4px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 6px 22px rgba(77,255,160,.28);transition:.18s;}
.btn-primary:active{transform:scale(.97);filter:brightness(1.08);}
.join-bar{display:flex;gap:8px;}
.join-in{flex:1;padding:14px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;color:var(--hi);font-size:14px;letter-spacing:3px;text-transform:uppercase;outline:none;}
.join-in:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gdim);}
.join-in::placeholder{color:var(--low);}
.join-go{padding:0 20px;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;color:var(--g);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;}
.join-go:active{background:var(--s3);}
.mlist{display:flex;flex-direction:column;gap:9px;}
.mcard{background:var(--s1);border:1px solid var(--bd2);border-radius:13px;padding:13px 15px 13px 17px;position:relative;overflow:hidden;animation:cardin .3s ease;}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--g);}
.mcard.ended::before{background:var(--low);}
.mcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:9px;}
.mcard-names{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--hi);letter-spacing:.5px;}
.mcard-score{font-family:'Orbitron',monospace;font-size:21px;font-weight:900;color:var(--g);letter-spacing:1px;white-space:nowrap;}
.mcard.ended .mcard-score{color:var(--low);}
.mcard-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--mid);background:var(--s3);padding:3px 8px;border-radius:5px;}
.tag.code{color:var(--hi);font-family:'Orbitron',monospace;letter-spacing:2px;font-weight:700;}
.tag.live{color:var(--g);border:1px solid var(--gline);background:var(--gdim);animation:lp 2s infinite;}
.tag.ended{color:var(--low);border:1px solid var(--bd);}
.mcard-del{position:absolute;right:12px;bottom:12px;font-size:13px;color:var(--low);padding:5px 9px;border-radius:7px;background:var(--s3);border:1px solid var(--bd);}
.mcard-del:active{color:var(--red);border-color:var(--red);}
.nomatch{text-align:center;padding:42px 20px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--low);letter-spacing:2px;line-height:2.1;}

/* SETUP */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--mid);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;align-self:flex-start;}
.back:active{color:var(--hi);}
.setup-ttl{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:3px;color:var(--g);}
.codebox{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;}
.code-l{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--low);}
.code-v{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--g);letter-spacing:5px;}
.code-cp{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--mid);background:var(--s3);border:1px solid var(--bd2);border-radius:8px;padding:8px 12px;}
.code-cp:active{color:var(--g);}
.fld-lbl{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--low);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fin{width:100%;padding:13px 14px;background:var(--s1);border:1px solid var(--bd2);border-radius:10px;color:var(--hi);font-size:14px;outline:none;-webkit-appearance:none;transition:.18s;}
.fin:focus{border-color:var(--g);box-shadow:0 0 0 3px var(--gdim);}
.fin.p2:focus{border-color:var(--c);box-shadow:0 0 0 3px var(--cdim);}
select.fin{cursor:pointer;}
select.fin option{background:#0b1812;}
.panel{background:var(--s1);border:1px solid var(--bd2);border-radius:12px;padding:13px 15px;}
.panel-ttl{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--low);margin-bottom:11px;text-transform:uppercase;}
.frame-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.fopt{padding:11px 4px;border-radius:9px;border:1px solid var(--bd2);background:var(--s2);color:var(--mid);display:flex;flex-direction:column;gap:3px;align-items:center;transition:.15s;}
.fopt .fo-n{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;}
.fopt .fo-s{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.5px;color:var(--low);}
.fopt.on{background:var(--gdim);border-color:var(--g);color:var(--g);}
.fopt.on .fo-s{color:var(--gline);}
.fopt:active{transform:scale(.94);}
.subgrid{display:flex;gap:8px;flex-wrap:wrap;}
.subopt{padding:9px 15px;border-radius:9px;border:1px solid var(--bd2);background:var(--s2);color:var(--mid);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;}
.subopt.on{background:var(--gdim);border-color:var(--g);color:var(--g);}
.subopt.on.c{background:var(--cdim);border-color:var(--c);color:var(--c);}
.hcap-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hcap-side{flex:1;}
.hcap-nm{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--low);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step{display:flex;align-items:center;gap:0;background:var(--s2);border:1px solid var(--bd2);border-radius:10px;overflow:hidden;}
.step b{flex:1;text-align:center;font-family:'Orbitron',monospace;font-size:17px;font-weight:900;color:var(--hi);}
.step button{width:38px;height:40px;font-family:'Orbitron',monospace;font-size:20px;color:var(--g);background:var(--s3);}
.step button:active{background:var(--bd2);}
.step.c button{color:var(--c);}

/* ===== GAME ===== */
.game{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.sync{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;flex-shrink:0;color:var(--g);background:var(--gdim);border-bottom:1px solid var(--gline);}
.sync.off{color:var(--low);background:transparent;border-color:transparent;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:lp 1.5s infinite;}
.sync.off .sync-dot{background:var(--low);animation:none;}
.fbanner{display:flex;align-items:center;justify-content:center;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:6px 14px;flex-shrink:0;}
.fpips{flex:1;display:flex;gap:4px;align-items:center;}
.fpips.r{justify-content:flex-end;}
.pip{width:15px;height:7px;border-radius:3px;border:1px solid var(--bd2);background:var(--s3);transition:.3s;}
.pip.w0{background:var(--g);border-color:var(--g);box-shadow:0 0 7px rgba(77,255,160,.5);}
.pip.w1{background:var(--c);border-color:var(--c);box-shadow:0 0 7px rgba(57,224,255,.5);}
.fb-mid{text-align:center;padding:0 14px;min-width:92px;}
.fb-sc{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--hi);letter-spacing:3px;line-height:1;}
.fb-lb{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1.5px;color:var(--low);margin-top:3px;}

.gbody{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* turn bar */
.turnbar{display:flex;align-items:center;justify-content:center;gap:10px;padding:7px 14px;flex-shrink:0;font-family:'Orbitron',monospace;font-weight:800;letter-spacing:2px;transition:.3s;border-bottom:1px solid var(--bd);}
.turnbar.t0{background:linear-gradient(90deg,var(--gdim),transparent 70%);color:var(--g);}
.turnbar.t1{background:linear-gradient(270deg,var(--cdim),transparent 70%);color:var(--c);}
.turnbar .ta{font-size:18px;animation:nudge 1.1s ease-in-out infinite;}
.turnbar.t1 .ta{transform:scaleX(-1);}
.turnbar .tn{font-size:15px;}
.turnbar .tnext{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--low);font-weight:400;}

/* scoreboard */
.sb{display:grid;grid-template-columns:1fr auto 1fr;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;position:relative;overflow:hidden;}
.sb.flash::after{content:'';position:absolute;inset:0;animation:sflash .5s ease forwards;pointer-events:none;}
.pside{padding:10px 13px;position:relative;transition:.3s;}
.pside.left{text-align:left;}
.pside.right{text-align:right;}
.pside.act0{background:linear-gradient(180deg,var(--gdim),transparent);}
.pside.act1{background:linear-gradient(180deg,var(--cdim),transparent);}
.ptag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--low);margin-bottom:2px;}
.pnm{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--mid);margin-bottom:5px;line-height:1.15;min-height:14px;}
.pside.act0 .pnm{color:var(--g);}
.pside.act1 .pnm{color:var(--c);}
.psub{display:inline-block;transition:.25s;}
.psub.cur0{color:var(--g);text-shadow:0 0 11px rgba(77,255,160,.7);font-weight:800;}
.psub.cur1{color:var(--c);text-shadow:0 0 11px rgba(57,224,255,.7);font-weight:800;}
.psub.off{color:var(--low);font-size:.85em;}
.pslash{color:var(--low);padding:0 3px;}
.psc{font-family:'Orbitron',monospace;font-size:46px;font-weight:900;line-height:.95;color:var(--hi);letter-spacing:-2px;}
.psc.bump{animation:bump .35s cubic-bezier(.34,1.6,.64,1);}
.pbrk{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--low);margin-top:4px;letter-spacing:1px;}
.pbrk b{font-weight:700;}
.pside.act0 .pbrk b{color:var(--g);}
.pside.act1 .pbrk b{color:var(--c);}
.score-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 13px;border-left:1px solid var(--bd);border-right:1px solid var(--bd);gap:6px;}
.vs{font-family:'Orbitron',monospace;font-size:11px;color:var(--low);letter-spacing:2px;}
.diff{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--mid);white-space:nowrap;}
.score-edit{font-size:11px;color:var(--low);border:1px solid var(--bd2);border-radius:6px;padding:3px 7px;background:var(--s2);}
.score-edit:active{color:var(--g);}

/* status strip */
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bd);border-bottom:1px solid var(--bd);flex-shrink:0;}
.cell{background:var(--bg);padding:9px 4px;text-align:center;}
.cell-l{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--low);text-transform:uppercase;margin-bottom:3px;}
.cell-v{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--hi);}
.cell-v.ph{color:var(--g);font-size:13px;letter-spacing:1px;}

/* snooker status */
.snk-st{padding:7px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;text-align:center;flex-shrink:0;border-bottom:1px solid var(--bd);}
.snk-st b{font-family:'Orbitron',monospace;font-weight:900;}
.snk-st.warn{background:rgba(255,207,77,.08);color:var(--amber);}
.snk-st.dead{background:rgba(255,93,84,.08);color:var(--red);}

/* balls */
.ball-sec{padding:10px 12px 9px;flex-shrink:0;}
.minilbl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--low);text-transform:uppercase;margin-bottom:9px;}
.ball-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.ball{aspect-ratio:1;border-radius:50%;border:2px solid rgba(255,255,255,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:.13s;box-shadow:inset 0 -5px 9px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.22),0 3px 9px rgba(0,0,0,.5);}
.ball::after{content:'';position:absolute;top:12%;left:18%;width:30%;height:24%;background:rgba(255,255,255,.4);border-radius:50%;transform:rotate(-35deg);}
.ball .bp{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.85);line-height:1;z-index:2;}
.ball .bn{font-family:'Share Tech Mono',monospace;font-size:6px;letter-spacing:.4px;color:rgba(255,255,255,.8);z-index:2;margin-top:1px;}
.ball:active{transform:scale(.86);box-shadow:inset 0 -2px 4px rgba(0,0,0,.6),0 0 22px rgba(77,255,160,.5);}
.ball.dis{opacity:.2;pointer-events:none;filter:grayscale(.8);}
.b-red{background:radial-gradient(circle at 38% 32%,#e74c3c,var(--b-red) 50%,#7b0000);}
.b-yellow{background:radial-gradient(circle at 38% 32%,#f9e34a,var(--b-yellow) 50%,#8a6d00);}
.b-green{background:radial-gradient(circle at 38% 32%,#52d68a,var(--b-green) 50%,#145a32);}
.b-brown{background:radial-gradient(circle at 38% 32%,#c0714a,var(--b-brown) 50%,#3d1a05);}
.b-blue{background:radial-gradient(circle at 38% 32%,#5dade2,var(--b-blue) 50%,#154360);}
.b-pink{background:radial-gradient(circle at 38% 32%,#f48fb1,var(--b-pink) 50%,#880040);}
.b-black{background:radial-gradient(circle at 38% 32%,#4a4a4a,#222 50%,#000);}

/* actions */
.act-sec{padding:4px 12px 8px;flex-shrink:0;}
.act-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.act{padding:11px 4px;border-radius:11px;border:1px solid var(--bd2);background:var(--s1);color:var(--mid);font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.14s;}
.act i{font-size:17px;}
.act:active{transform:scale(.94);background:var(--s2);}
.act.miss{border-color:rgba(255,207,77,.35);color:var(--amber);}
.act.foul{border-color:rgba(255,93,84,.35);color:var(--red);}
.act.undo{border-color:var(--cline);color:var(--c);}
.act.endm{border-color:rgba(255,207,77,.35);color:var(--amber);}

/* log */
.log-sec{flex:1;padding:0 12px 8px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.log-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.le{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:7px 11px;background:var(--s1);border-left:3px solid var(--bd2);border-radius:5px;animation:slidein .2s ease;flex-shrink:0;}
.le.foul{border-left-color:var(--red);}
.le.miss{border-left-color:var(--amber);}
.le.pot{border-left-color:var(--g);}
.le.system{border-left-color:var(--c);}
.le.adjust{border-left-color:var(--info);}
.le-ts{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--low);white-space:nowrap;}
.le-tx{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--mid);}
.le-pt{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--hi);white-space:nowrap;}

/* OVERLAYS */
.ov{position:fixed;inset:0;background:rgba(2,8,5,.9);display:flex;align-items:flex-end;justify-content:center;z-index:500;animation:fade .2s;padding-bottom:var(--safe-bot);backdrop-filter:blur(3px);}
.ov.center{align-items:center;}
.sheet{background:var(--s1);border:1px solid var(--bd2);border-top-color:var(--gline);border-radius:22px 22px 0 0;padding:18px 16px 22px;width:100%;max-width:520px;animation:slideup .3s cubic-bezier(.34,1.2,.64,1);max-height:92dvh;overflow-y:auto;}
.sheet.c{border-radius:18px;width:90%;max-width:400px;animation:scalein .25s cubic-bezier(.34,1.3,.64,1);}
.grip{width:42px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px;}
.sh-ttl{font-family:'Orbitron',monospace;font-size:18px;font-weight:800;letter-spacing:3px;color:var(--g);text-align:center;margin-bottom:4px;}

/* foul */

.tg{width:48px;height:28px;border-radius:14px;background:var(--s3);border:1px solid var(--bd2);position:relative;flex-shrink:0;transition:.2s;}

.tg.on{background:rgba(255,93,84,.25);border-color:var(--red);}
.tg.on::after{left:23px;background:var(--red);}
.redrem{background:rgba(255,93,84,.06);border:1px solid rgba(255,93,84,.25);border-radius:12px;padding:11px 14px;margin-bottom:12px;}

.apply-btn{width:100%;padding:15px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--red),#c0392b);color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:2px;box-shadow:0 5px 18px rgba(255,93,84,.3);}

/* adjust */
.adj-tabs{display:flex;gap:8px;margin-bottom:14px;}
.adj-tab{flex:1;padding:11px;border-radius:11px;border:1px solid var(--bd2);background:var(--s2);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--mid);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.adj-tab.on0{background:var(--gdim);border-color:var(--g);color:var(--g);}
.adj-tab.on1{background:var(--cdim);border-color:var(--c);color:var(--c);}
.adj-disp{text-align:center;margin-bottom:14px;}
.adj-cur{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--low);letter-spacing:1px;}
.adj-new{font-family:'Orbitron',monospace;font-size:40px;font-weight:900;color:var(--hi);line-height:1.1;}
.adj-delta{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;}
.adj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.adj-q{padding:13px 4px;border-radius:10px;border:1px solid var(--bd2);background:var(--s2);color:var(--hi);font-family:'Orbitron',monospace;font-size:15px;font-weight:700;}
.adj-q:active{transform:scale(.93);background:var(--s3);}
.adj-q.minus{color:var(--red);}
.adj-q.plus{color:var(--g);}

/* winner */
.mfs{background:var(--s2);border:1px solid var(--bd2);border-radius:12px;padding:12px;margin-bottom:14px;display:flex;align-items:center;}
.mfs-s{flex:1;text-align:center;}
.mfs-n{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--low);letter-spacing:1px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mfs-f{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;line-height:1;}
.mfs-f.f0{color:var(--g);}
.mfs-f.f1{color:var(--c);}
.mfs-d{font-family:'Orbitron',monospace;font-size:13px;color:var(--low);padding:0 14px;}
.mfs-t{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--low);letter-spacing:1px;margin-top:3px;}

.win-lb{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--low);margin-bottom:8px;}

.win-sc{font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--mid);letter-spacing:3px;}

.win-gif.oudom{border-color:gold;box-shadow:0 0 24px rgba(255,215,0,.45);}
.win-gif img{width:100%;height:160px;object-fit:fill;display:block;}
.mbtns{display:grid;gap:9px;}
.mbtns.g2{grid-template-columns:1fr 1fr;}
.mbtns.g3{grid-template-columns:1fr 1fr 1fr;}
.mb{padding:15px 6px;border-radius:11px;border:1px solid var(--bd2);background:var(--s2);color:var(--hi);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;text-align:center;}
.mb:active{background:var(--s3);}
.mb.pri{background:var(--gdim);border-color:var(--g);color:var(--g);}
.mb.sec{background:var(--cdim);border-color:var(--c);color:var(--c);}
.mb.amb{background:rgba(255,207,77,.1);border-color:rgba(255,207,77,.4);color:var(--amber);}
.decider-flag{text-align:center;font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px;color:var(--amber);background:rgba(255,207,77,.1);border:1px solid rgba(255,207,77,.3);border-radius:9px;padding:8px;margin-bottom:12px;animation:lp 1.6s infinite;}

/* analytics */
.an-bar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:11px;margin-bottom:16px;background:var(--s2);border:1px solid var(--bd2);border-radius:12px;padding:13px;}
.an-side{text-align:center;min-width:54px;}
.an-nm{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--low);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;}
.an-v{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;line-height:1;}
.an-v.v0{color:var(--g);}
.an-v.v1{color:var(--c);}
.an-track{height:9px;border-radius:5px;background:var(--bd);display:flex;overflow:hidden;}
.an-fill0{background:linear-gradient(90deg,var(--g),rgba(77,255,160,.5));transition:width .5s;}
.an-fill1{background:linear-gradient(90deg,rgba(57,224,255,.5),var(--c));transition:width .5s;}
.an-slbl{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--low);margin:14px 0 10px;}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.an-stat{background:var(--s2);border:1px solid var(--bd2);border-radius:11px;padding:12px;display:flex;flex-direction:column;gap:7px;}
.an-stat-l{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--low);text-transform:uppercase;}
.an-stat-rows{display:flex;flex-direction:column;gap:4px;}
.an-stat-row{display:flex;align-items:center;gap:7px;}
.an-stat-row-n{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--mid);width:42px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.an-rt{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden;}
.an-rf{height:100%;border-radius:3px;transition:width .6s;}
.an-rf.p0{background:var(--g);}
.an-rf.p1{background:var(--c);}
.an-stat-row-v{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--hi);width:30px;text-align:right;flex-shrink:0;}
.an-balls{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.an-ball{display:flex;flex-direction:column;align-items:center;gap:3px;}
.an-ball-d{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:11px;font-weight:900;color:#fff;box-shadow:inset 0 -3px 6px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.2);position:relative;}
.an-ball-l{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--low);}
.an-ball-c{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--hi);}

/* conclusion */
.conc-w{text-align:center;padding:11px;background:var(--s2);border:1px solid var(--bd2);border-radius:11px;margin-bottom:12px;}
.conc-w-l{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--low);margin-bottom:4px;}
.conc-w-n{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--g);letter-spacing:1px;}
.conc-w-s{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--mid);letter-spacing:2px;margin-top:3px;}
.conc-tabs{display:flex;gap:6px;margin-bottom:13px;overflow-x:auto;padding-bottom:2px;}
.conc-tab{flex-shrink:0;padding:7px 14px;border-radius:9px;border:1px solid var(--bd2);background:var(--s2);font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--low);white-space:nowrap;}
.conc-tab.on{background:var(--gdim);border-color:var(--g);color:var(--g);}
.conc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.conc-card{background:var(--s2);border:1px solid var(--bd2);border-radius:11px;padding:12px;}
.conc-card-l{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--low);margin-bottom:8px;}
.conc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.conc-row-p{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;}
.conc-row-v{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--hi);}
.conc-row-v.hi{color:var(--g);}
.conc-row-v.red{color:var(--red);}
.conc-row-v.blue{color:var(--c);}
.conc-bb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);}
.conc-bb-d{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:7px;font-weight:900;color:#fff;}
.conc-bb-n{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--mid);flex:1;letter-spacing:1px;}
.conc-bb-bars{display:flex;gap:5px;align-items:center;flex:2;}
.conc-bb-w{flex:1;}
.conc-bb-t{height:5px;background:var(--bd);border-radius:3px;overflow:hidden;}
.conc-bb-f{height:100%;border-radius:3px;}
.conc-bb-c{font-family:'Orbitron',monospace;font-size:11px;color:var(--hi);width:16px;text-align:right;flex-shrink:0;}

/* toast */
.toast{position:fixed;top:calc(var(--safe-top) + 58px);left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bd2);border-radius:20px;padding:9px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--g);z-index:9998;white-space:nowrap;animation:toastin .3s cubic-bezier(.34,1.3,.64,1);pointer-events:none;}
.toast.warn{color:var(--amber);}
.toast.err{color:var(--red);}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:9990;}

/* keyframes */
@keyframes lp{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(4px);}}
@keyframes slidein{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:none;}}
@keyframes cardin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes slideup{from{transform:translateY(60px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes scalein{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:none;}}
@keyframes bump{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(.96);}100%{transform:scale(1);}}
@keyframes sflash{0%{background:rgba(77,255,160,0);}20%{background:rgba(77,255,160,.08);}100%{background:rgba(77,255,160,0);}}
@keyframes wpop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.1);opacity:1;}100%{transform:scale(1);}}
@keyframes toastin{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}

/* landscape / tablet */
@media (orientation:landscape) and (min-width:680px){
  .gbody.land{display:grid;grid-template-columns:1.05fr .95fr;grid-template-rows:auto 1fr;gap:0;overflow:hidden;}
  .gbody.land .turnbar{grid-column:1 / -1;}
  .gbody.land .land-left{display:flex;flex-direction:column;min-height:0;overflow:hidden;border-right:1px solid var(--bd);}
  .gbody.land .land-right{display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .gbody.land .psc{font-size:54px;}
  .gbody.land .ball .bp{font-size:16px;}
}
@media (min-width:760px){
  .pad{max-width:620px;margin:0 auto;width:100%;}
  .sheet{max-width:620px;}
}
@media (max-width:360px){
  .psc{font-size:38px;}
  .ball .bp{font-size:12px;}
  .ball .bn{font-size:5px;}
  .ball-grid{gap:6px;}
  .an-grid,.conc-grid{grid-template-columns:1fr;}
}

<script>
"use strict";

   Everything you might want to change lives in CONFIG just below.
   ===================================================================== */
const CONFIG = {
  // Your Firebase Realtime Database URL (for live cross-device score sharing).
  FIREBASE_URL: 'https://snooker-app-cc170-default-rtdb.asia-southeast1.firebasedatabase.app',
  voiceOnByDefault: false,  // start with voice commentary ON? (tap the speaker icon to toggle anytime)

  defaultReds:      15      // default number of reds pre-selected in setup
};

/* ---------- constants ---------- */
const LOGO_SRC = '__LOGO_DATA_URI__';
const PHASE = { REDS:'REDS', COLORS:'COLOURS', ENDED:'ENDED' };
const COLOR_ORDER = ['yellow','green','brown','blue','pink','black'];
const LS = 'snk_matches_v4';
const OUDOM_GIFS = ['https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif','https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif'];
const DEFAULT_GIFS = ['https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif','https://media.giphy.com/media/3oz8xAFtqoOUUrsh7W/giphy.gif'];
const BALL_PTS = { red:1, yellow:2, green:3, brown:4, blue:5, pink:6, black:7 };
const BALL_NAMES = { red:'RED', yellow:'YLW', green:'GRN', brown:'BRN', blue:'BLU', pink:'PNK', black:'BLK' };
const BALL_FULL = { red:'RED', yellow:'YELLOW', green:'GREEN', brown:'BROWN', blue:'BLUE', pink:'PINK', black:'BLACK' };
const BALL_ORDER = ['red','yellow','green','brown','blue','pink','black'];
const BALL_STYLES = {
  red:'radial-gradient(circle at 38% 32%,#e74c3c,#c0392b 50%,#7b0000)',
  yellow:'radial-gradient(circle at 38% 32%,#f9e34a,#f1c40f 50%,#8a6d00)',
  green:'radial-gradient(circle at 38% 32%,#52d68a,#27ae60 50%,#145a32)',
  brown:'radial-gradient(circle at 38% 32%,#c0714a,#8B4513 50%,#3d1a05)',
  blue:'radial-gradient(circle at 38% 32%,#5dade2,#2980b9 50%,#154360)',
  pink:'radial-gradient(circle at 38% 32%,#f48fb1,#ec4899 50%,#880040)',
  black:'radial-gradient(circle at 38% 32%,#4a4a4a,#222 50%,#000)'
};
const KM_COLOUR = { red:'ក្រហម', yellow:'លឿង', green:'បៃតង', brown:'ត្នោត', blue:'ខៀវ', pink:'ផ្កាឈូក', black:'ខ្មៅ' };

const S = {
  screen:'lobby', G:null, currentRoomCode:null, pendingRoomCode:null,
  su:{ p1:'', p2:'', reds:CONFIG.defaultReds, breakFirst:0, frames:1, subStarters:[0,0], hcap:[0,0] },

  win:null, conclusionFrame:0, deleteCode:null, endMatchPick:0,
  isMuted:!CONFIG.voiceOnByDefault, lang:'en', sync:{ online:false, label:'CONNECTING…' },

let firebaseListener = null;
let myWriteId = 0;
const pendingMyWrites = new Set();
let potLock = 0;
let lastProbe = 0;

/* ---------- tiny helpers ---------- */
function esc(s){ return (''+(s==null?'':s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function randomGif(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function isKm(){ return S.lang==='km'; }
function kmColour(c){ const k=(''+(c||'')).toLowerCase(); return KM_COLOUR[k]||c; }

function toast(msg,type){
  S.toast = { msg, cls:type||'' };
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ S.toast=null; render(); }, 2200);

function warn(msg){ logEvent('system','⚠ ILLEGAL',msg,''); toast(msg,'warn'); }

function getSubPlayers(G,ti){ if(!G||!G.players||!G.players[ti]) return ['?']; return G.players[ti].split('/').map(s=>s.trim()).filter(Boolean); }
function getActiveName(G,ti){ const subs=getSubPlayers(G,ti); if(subs.length<=1) return subs[0]; const sp=G.subPlayer||[0,0]; return subs[sp[ti]%subs.length]; }

/* ---------- localStorage ---------- */
function loadMatches(){ try{ return JSON.parse(localStorage.getItem(LS)||'{}'); }catch(e){ return {}; } }
function pruneMatches(all){
  const now=Date.now();
  for(const c of Object.keys(all)) if(all[c].phase===PHASE.ENDED && (now-(all[c].updatedAt||0))>7*864e5) delete all[c];
  let codes=Object.keys(all);
  if(codes.length>24){
    const sorted=codes.sort((a,b)=>(all[a].updatedAt||0)-(all[b].updatedAt||0));

  all[code]={ ...packState(G), updatedAt:G.updatedAt||Date.now() };
  all=pruneMatches(all);
  try{ localStorage.setItem(LS,JSON.stringify(all)); }
  catch(e){
    const clean={}; Object.keys(all).forEach(c=>{ if(all[c].phase!==PHASE.ENDED) clean[c]=all[c]; });
    try{ localStorage.setItem(LS,JSON.stringify(clean)); }catch(_){}
    toast('STORAGE FULL','err');
  }
}
function deleteMatch(code){ const all=loadMatches(); delete all[code]; localStorage.setItem(LS,JSON.stringify(all)); }
function generateCode(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join(''); }

/* ---------- firebase realtime sync ---------- */
function firebaseConfigured(){ return CONFIG.FIREBASE_URL.startsWith('https://'); }
function roomUrl(code){ return CONFIG.FIREBASE_URL+'/rooms/'+code+'.json'; }
function syncErrLabel(status){
  if(status===401||status===403) return 'SYNC BLOCKED · FIREBASE RULES (401)';
  if(status===404) return 'SYNC OFF · DATABASE NOT FOUND';
  if(status===0)   return 'OFFLINE · NO CONNECTION';
  return 'SYNC ERROR · '+status;
}
function setSync(online,label){ S.sync={online,label}; render(); }
async function firebaseWrite(code,G){
  if(!firebaseConfigured()) return {ok:false,status:0};
  try{ const r=await fetch(roomUrl(code),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(packState(G))}); return {ok:r.ok,status:r.status}; }
  catch(e){ return {ok:false,status:0}; }
}
function firebaseStopListen(){ if(firebaseListener){ firebaseListener.close(); firebaseListener=null; } }
async function firebaseProbe(code){
  try{
    const r=await fetch(roomUrl(code)); lastProbe=r.status;
    if(r.status===401||r.status===403){ setSync(false,syncErrLabel(r.status)); return false; }
    if(r.status===404){ setSync(false,syncErrLabel(404)); }
    return true;
  }catch(e){ lastProbe=0; return true; }
}
function firebaseListen(code){
  firebaseStopListen();
  if(!firebaseConfigured()){ setSync(false,'LOCAL ONLY'); return; }
  firebaseProbe(code);
  setSync(false,'CONNECTING…');
  let es; try{ es=new EventSource(roomUrl(code)); }catch(e){ setSync(false,'LOCAL ONLY'); return; }
  firebaseListener=es;
  es.addEventListener('put',e=>{
    try{
      const remote=JSON.parse(e.data).data;
      if(!remote||!remote.scores||!remote.players) return;
      if(remote._writeId && pendingMyWrites.has(remote._writeId)){ pendingMyWrites.delete(remote._writeId); return; }
      const G=S.G||{};
      const remoteTs=remote.updatedAt||0, localTs=G.updatedAt||0;
      if(remoteTs>0 && localTs>0 && remoteTs<=localTs && !G._pendingJoin) return;
      const prev=[...(G.scores||[0,0])], wasPending=!!G._pendingJoin;
      const NG={ ...remote, history:remote.history||[], _pendingJoin:false };
      if(!NG.subPlayer) NG.subPlayer=[0,0];
      logSeq=(NG.logs&&NG.logs.length)||0;
      setSync(true,'LIVE · '+code);
      if(wasPending) toast('MATCH SYNCED ✓');
      if(prev[0]!==NG.scores[0]) animScore(0);
      if(prev[1]!==NG.scores[1]) animScore(1);
      S.G=NG; render();
      const all=loadMatches(); all[code]={ ...packState(NG), updatedAt:NG.updatedAt||Date.now() };
      try{ localStorage.setItem(LS,JSON.stringify(all)); }catch(_){}
    }catch(err){ console.warn(err); }
  });
  es.onerror=()=>{ if(lastProbe===401||lastProbe===403){ setSync(false,syncErrLabel(lastProbe)); } else { setSync(false,'RECONNECTING…'); } };
  es.onopen=()=>setSync(true,'LIVE · '+code);
}
async function publishAll(){
  const code=S.currentRoomCode; if(!code) return;
  const wid=++myWriteId; pendingMyWrites.add(wid);
  const G={ ...S.G, _writeId:wid, updatedAt:Date.now() };
  S.G=G; saveMatch(code,G);
  if(firebaseConfigured()){
    const res=await firebaseWrite(code,G);
    if(res.ok) setSync(true,'LIVE · '+code);
    else setSync(false,syncErrLabel(res.status));
  }
  setTimeout(()=>pendingMyWrites.delete(wid),10000);
}

/* ---------- game engine ---------- */
function logEvent(type,who,action,pts){
  const ts=new Date().toTimeString().slice(0,8); const G=S.G; if(!G) return;
  if(!G.logs) G.logs=[];
  G.logs.unshift({ type,who,action,pts,ts,id:logSeq++ });
  if(G.logs.length>80) G.logs.pop();
}
function saveSnap(){ const G=S.G; if(!G.history) G.history=[]; G.history.push(JSON.stringify({ ...G, history:[] })); if(G.history.length>20) G.history.shift(); }
function calcPointsLeft(s){
  if(s.phase===PHASE.ENDED) return 0;
  if(s.phase===PHASE.COLORS){ const v={yellow:2,green:3,brown:4,blue:5,pink:6,black:7}; return COLOR_ORDER.slice(s.colourIndex).reduce((a,c)=>a+v[c],0); }
  const r=Math.max(0,s.redsRemaining||0); return s.nextIsRed ? r*8+27 : 7+r*8+27;
}
function animScore(p){ S.bump[p]=true; render(); setTimeout(()=>{ S.bump[p]=false; render(); },360); }
function flashSb(){ S.flash=true; render(); setTimeout(()=>{ S.flash=false; render(); },500); }

function onPot(colour,pts){
  const G=S.G; if(!G||G.phase===PHASE.ENDED) return;
  const now=Date.now(); if(now-potLock<280) return;
  if(G.phase===PHASE.REDS){
    if(colour==='red'&&!G.nextIsRed) return warn('Pot a COLOUR next!');
    if(colour!=='red'&&G.nextIsRed) return warn('Pot a RED next!');
    if(colour==='red'&&G.redsRemaining<=0) return warn('No reds left!');
  } else if(G.phase===PHASE.COLORS){ if(colour!==COLOR_ORDER[G.colourIndex]) return warn('Pot '+COLOR_ORDER[G.colourIndex].toUpperCase()+' next!'); }
  potLock=now; saveSnap();
  const p=G.cur; G.scores[p]+=pts; G.breaks[p]+=pts;
  let frameEnded=false;
  if(G.phase===PHASE.REDS){
    if(colour==='red'){ G.redsRemaining=Math.max(0,G.redsRemaining-1); G.nextIsRed=false; logEvent('pot',getActiveName(G,p),'POTS RED','+'+pts); }
    else { logEvent('pot',getActiveName(G,p),'POTS '+colour.toUpperCase(),'+'+pts); if(G.redsRemaining===0){ G.phase=PHASE.COLORS; G.colourIndex=0; G.nextIsRed=false; logEvent('system','ALL REDS CLEARED — COLOURS PHASE','',''); } else G.nextIsRed=true; }
  } else if(G.phase===PHASE.COLORS){ logEvent('pot',getActiveName(G,p),'POTS '+colour.toUpperCase(),'+'+pts); G.colourIndex++; if(G.colourIndex>=COLOR_ORDER.length){ frameEnded=true; } }
  render();
  animScore(p); flashSb();
  speakPot(getActiveName(G,G.cur),colour);
  if(frameEnded){ endFrame(); return; }
  persist(); publishAll();
}
function switchTurn(){
  const G=S.G; if(!G.subPlayer) G.subPlayer=[0,0];
  // advance the OUTGOING team's sub-player so their partner is up next time;
  // the incoming team keeps its pointer so each team's chosen opener plays their first visit.
  const out=G.cur; const subsOut=getSubPlayers(G,out); if(subsOut.length>1) G.subPlayer[out]=(G.subPlayer[out]+1)%subsOut.length;
  G.cur=1-G.cur; G.breaks[G.cur]=0;
  if(G.phase===PHASE.REDS){ if(G.redsRemaining===0){ G.phase=PHASE.COLORS; G.colourIndex=0; logEvent('system','ALL REDS CLEARED — COLOURS PHASE','',''); } else G.nextIsRed=true; }
  speakPlayer(G.cur);
}
function onMiss(){ const G=S.G; if(!G||G.phase===PHASE.ENDED) return; saveSnap(); logEvent('miss',getActiveName(G,G.cur),'MISS — TURN ENDS',''); switchTurn(); render(); persist(); publishAll(); }
function onUndo(){
  const G=S.G; if(!G||!G.history||!G.history.length){ toast('NOTHING TO UNDO','warn'); return; }
  const snap=JSON.parse(G.history.pop()); snap.history=G.history; snap.logs=G.logs; snap.redsRemaining=Math.max(0,snap.redsRemaining||0); if(!snap.subPlayer) snap.subPlayer=[0,0];
  logEvent('system','UNDO','','');
  S.G=snap; render(); persist(); publishAll();
}

function applyFoul(pts,redsToRemove){
  const G=S.G; S.overlay=null; if(G.phase===PHASE.ENDED){ render(); return; }
  saveSnap();
  const fouler=G.cur, opp=1-fouler, penalty=Math.max(pts,4);
  const foulerName=getActiveName(G,fouler), oppName=getActiveName(G,opp);
  G.scores[opp]+=penalty;
  if(redsToRemove>0){ const n=Math.min(redsToRemove,G.redsRemaining); G.redsRemaining=Math.max(0,G.redsRemaining-n); logEvent('foul',foulerName,'FOUL +'+n+' RED'+(n>1?'S':'')+' REMOVED → '+G.players[opp],'+'+penalty); logEvent('system',G.redsRemaining+' RED'+(G.redsRemaining!==1?'S':'')+' REMAIN','',''); }
  else { logEvent('foul',foulerName,'FOUL → '+G.players[opp],'+'+penalty); }
  if(!G.foulCount) G.foulCount=[0,0]; G.foulCount[fouler]++;
  if(!G.maxFoulPenalty) G.maxFoulPenalty=[0,0]; if(penalty>G.maxFoulPenalty[fouler]) G.maxFoulPenalty[fouler]=penalty;
  switchTurn(); render(); animScore(opp); flashSb();
  speakFoul(foulerName,oppName,penalty);
  persist(); publishAll();
}

/* ---------- frame end / draw / decider ---------- */
function endFrame(){
  const G=S.G; G.phase=PHASE.ENDED;
  const w=G.scores[0]>G.scores[1]?0:G.scores[1]>G.scores[0]?1:-1;
  const rec={ frame:G.currentFrameNum||1,scores:[...G.scores],winner:w,logs:[...(G.logs||[])],players:[...G.players],foulCount:[...(G.foulCount||[0,0])],maxFoulPenalty:[...(G.maxFoulPenalty||[0,0])],maxBreak:computeMaxBreak(G.logs||[],G.players),totalPots:computeTotalPots(G.logs||[],G.players),ballCounts:computeBallCounts(G.logs||[],G.players) };
  if(!G.frameHistory) G.frameHistory=[]; G.frameHistory.push(rec);
  if(!G.frameWins) G.frameWins=[0,0]; if(w>=0) G.frameWins[w]++;
  logEvent('system','FRAME '+(G.currentFrameNum||1)+' COMPLETE — '+(w>=0?G.players[w]+' WINS':'LEVEL'),'','');
  render();
  const tf=G.totalFrames||1, toWin=Math.ceil(tf/2);
  const matchOver=tf===1||G.frameWins[0]>=toWin||G.frameWins[1]>=toWin;
  persist(); publishAll();

function showWinnerModal(fw,matchOver){
  const G=S.G, tf=G.totalFrames||1, toWin=Math.ceil(tf/2), f0=G.frameWins[0]||0, f1=G.frameWins[1]||0;
  const win={ showFrames:tf>1, name0:G.players[0], name1:G.players[1], frames0:f0, frames1:f1, toWin:toWin+' TO WIN', isDecider:false };
  // a LEVEL frame must be resolved FIRST (re-spot black or accept draw) — never an auto match-draw
  if(fw<0){
    win.label='// FRAME '+(G.currentFrameNum||1)+' LEVEL //';
    win.draw=true; win.name='SCORES LEVEL'; win.score=G.scores[0]+'  —  '+G.scores[1];
    win.showRespot=true; win.showDraw=true; win.showNext=false; win.showDismiss=false; win.showGif=false;
    speak(isKm()?'ពិន្ទុស្មើគ្នា សូមដាក់កូនខ្មៅឡើងវិញ ឬព្រមជាស្មើ':'The frame is level. Re-spot the black for sudden death, or call it a draw');
    S.win=win; S.overlay='winner'; render(); return;
  }
  if(matchOver){
    const mw=tf>1?(f0>f1?0:f1>f0?1:-1):fw;
    win.label=tf>1?'// MATCH COMPLETE //':'// FRAME COMPLETE //';
    win.draw=(mw<0);
    win.name=mw>=0?G.players[mw]+' WINS':'MATCH DRAWN';
    win.score=G.scores[0]+'  —  '+G.scores[1];
    if(mw>=0){ const isOudom=G.players[mw].toUpperCase().includes('UDOM')||G.players[mw].toUpperCase().includes('ODOM'); win.gif=randomGif(isOudom?OUDOM_GIFS:DEFAULT_GIFS); win.gifOudom=isOudom; win.showGif=true; }
    win.showDismiss=true;
    speakMatchWin(mw);
  } else {
    win.label='// FRAME '+(G.currentFrameNum||1)+' COMPLETE //';
    win.draw=false; win.name=G.players[fw]+' WINS FRAME'; win.score=G.scores[0]+'  —  '+G.scores[1];
    win.showNext=true; win.isDecider=(f0===toWin-1&&f1===toWin-1);
    speakFrameWin(fw);
  }
  S.win=win; S.overlay='winner'; render();
}
function onAcceptDraw(){
  const G=S.G, tf=G.totalFrames||1, toWin=Math.ceil(tf/2), f0=G.frameWins[0]||0, f1=G.frameWins[1]||0;
  const played=(G.frameHistory||[]).length;
  logEvent('system','FRAME '+(G.currentFrameNum||1)+' DRAWN','','');
  if(tf===1||played>=tf||f0>=toWin||f1>=toWin){

/* ---------- analytics math ---------- */
function whoToTeam(who,players){ if(!who||!players) return -1; const w=(''+who).toUpperCase(); for(let i=0;i<players.length;i++){ const p=(players[i]||'').toUpperCase(); if(p===w) return i; const subs=p.split('/').map(s=>s.trim()); if(subs.includes(w)) return i; } return -1; }
function computeMaxBreak(logs,players){ const pl=players||[]; const r=[0,0]; if(!logs||!logs.length) return r; let cp=-1,cb=0; [...logs].reverse().forEach(e=>{ if(e.type==='pot'){ const pi=whoToTeam(e.who,pl); if(pi<0) return; if(pi!==cp){ if(cp>=0&&cb>r[cp]) r[cp]=cb; cp=pi;cb=0; } cb+=parseInt((e.pts||'0').replace(/[^0-9]/g,''))||0; } else if(e.type==='miss'||e.type==='foul'){ if(cp>=0&&cb>r[cp]) r[cp]=cb; cp=-1;cb=0; } }); if(cp>=0&&cb>r[cp]) r[cp]=cb; return r; }
function computeTotalPots(logs,players){ const pl=players||[]; const r=[0,0]; if(!logs) return r; logs.forEach(e=>{ if(e.type==='pot'){ const pi=whoToTeam(e.who,pl); if(pi>=0) r[pi]++; } }); return r; }
function computeBallCounts(logs,players){ const pl=players||[]; const r={red:[0,0],yellow:[0,0],green:[0,0],brown:[0,0],blue:[0,0],pink:[0,0],black:[0,0]}; if(!logs) return r; logs.forEach(e=>{ if(e.type==='pot'){ const pi=whoToTeam(e.who,pl); if(pi<0) return; const b=(e.action||'').replace('POTS ','').toLowerCase().replace(/[^a-z]/g,''); if(r[b]) r[b][pi]++; } }); return r; }
function computeAnalyticsData(g){
  if(!g||!g.logs) return null; const pl=g.players||[];
  const stats=[{pots:0,fouls:0,misses:0,ballCounts:{red:0,yellow:0,green:0,brown:0,blue:0,pink:0,black:0}},{pots:0,fouls:0,misses:0,ballCounts:{red:0,yellow:0,green:0,brown:0,blue:0,pink:0,black:0}}];
  g.logs.forEach(e=>{ const pi=whoToTeam(e.who,pl); if(pi<0) return; if(e.type==='pot'){ stats[pi].pots++; const b=(e.action||'').replace('POTS ','').toLowerCase().replace(/[^a-z]/g,''); if(stats[pi].ballCounts[b]!==undefined) stats[pi].ballCounts[b]++; } else if(e.type==='foul') stats[pi].fouls++; else if(e.type==='miss') stats[pi].misses++; });
  return { players:[pl[0]||'P1',pl[1]||'P2'], scores:g.scores||[0,0], stats, totals:[0,1].map(i=>stats[i].pots+stats[i].fouls+stats[i].misses) };
}

/* ---------- snooker situation ---------- */
function calcSnooker(s){
  if(s.phase===PHASE.ENDED) return {status:'ended'};
  const pl=calcPointsLeft(s); const s0=s.scores[0]||0, s1=s.scores[1]||0;
  if(s0===s1) return {status:'level',ptsLeft:pl};
  const leader=s0>s1?0:1, trailer=1-leader, diff=Math.abs(s0-s1);
  if(diff<=pl) return {status:'open',leader,trailer,diff,ptsLeft:pl};
  const snookersNeeded=Math.ceil((diff-pl)/4);
  const ballsLeft=s.phase===PHASE.REDS?(s.redsRemaining+6):(COLOR_ORDER.length-(s.colourIndex||0));
  const frameDecided=diff>pl+(ballsLeft*7);
  return { status:frameDecided?'decided':'snookers', leader,trailer,diff,ptsLeft:pl,snookersNeeded,ballsLeft };
}

function captureFocus(){
  const el=document.activeElement;
  if(el && el.dataset && el.dataset.fkey){
    let start=null,end=null; try{ start=el.selectionStart; end=el.selectionEnd; }catch(e){}
    return { key:el.dataset.fkey, start, end };
  }
  return null;
}
function restoreFocus(f){
  if(!f) return;
  const el=document.querySelector('[data-fkey="'+f.key+'"]');
  if(el){ try{ el.focus(); if(f.start!=null) el.setSelectionRange(f.start,f.end); }catch(e){} }
}

function buildNameHTML(G,ti){
  const subs=getSubPlayers(G,ti); const sp=G.subPlayer||[0,0];
  if(subs.length<=1) return '<span class="psub '+(G.cur===ti?('cur'+ti):'')+'">'+esc(subs[0]||'?')+'</span>';
  const idx=sp[ti]%subs.length;
  return subs.map((name,i)=>{
    const cur=(i===idx&&G.cur===ti);
    return '<span class="psub '+(cur?('cur'+ti):'off')+'">'+esc(name)+'</span>'+(i<subs.length-1?'<span class="pslash">/</span>':'');
  }).join('');
}

function renderGame(){
  const G=S.G, land=S.viewport.landscape;
  const tf=G.totalFrames||1, toWin=Math.ceil(tf/2);
  const fw0=G.frameWins?G.frameWins[0]:0, fw1=G.frameWins?G.frameWins[1]:0;
  let target; if(G.phase===PHASE.REDS) target=G.nextIsRed?'RED':'COLOUR'; else if(G.phase===PHASE.COLORS) target=(COLOR_ORDER[G.colourIndex]||'—').toUpperCase(); else target='ENDED';
  const enabled=new Set();
  if(G.phase===PHASE.REDS){ if(G.nextIsRed&&G.redsRemaining>0) enabled.add('red'); else if(!G.nextIsRed) ['yellow','green','brown','blue','pink','black'].forEach(b=>enabled.add(b)); }
  else if(G.phase===PHASE.COLORS){ const t=COLOR_ORDER[G.colourIndex]; if(t) enabled.add(t); }
  const ballsHtml=BALL_ORDER.map(c=>'<button class="ball b-'+c+' '+(enabled.has(c)?'':'dis')+'" data-act="pot" data-colour="'+c+'" data-pts="'+BALL_PTS[c]+'"><span class="bp">'+BALL_PTS[c]+'</span><span class="bn">'+BALL_NAMES[c]+'</span></button>').join('');

  const sit=calcSnooker(G);
  let snkHtml='';
  if(CONFIG.snookerHints){
    if(sit.status==='snookers') snkHtml='<div class="snk-st warn"><b>'+esc(G.players[sit.trailer])+'</b> NEEDS <b>'+sit.snookersNeeded+'</b> SNOOKER'+(sit.snookersNeeded>1?'S':'')+'</div>';
    else if(sit.status==='decided') snkHtml='<div class="snk-st dead"><b>FRAME DECIDED</b> · <b>'+esc(G.players[sit.leader])+'</b> WINS</div>';
  }

  const diff=Math.abs((G.scores[0]||0)-(G.scores[1]||0));
  const diffLabel=diff===0?'LEVEL':'+'+diff;
  const curName=getActiveName(G,G.cur);
  const nextHint='next: '+G.players[1-G.cur].split('/')[0];

  let banner='';
  if(tf>1){
    const pips0=Array.from({length:toWin},(_,i)=>'<div class="pip '+(i<fw0?'w0':'')+'"></div>').join('');
    const pips1=Array.from({length:toWin},(_,i)=>'<div class="pip '+(i<fw1?'w1':'')+'"></div>').join('');
    banner='<div class="fbanner"><div class="fpips">'+pips0+'</div><div class="fb-mid"><div class="fb-sc">'+fw0+' — '+fw1+'</div><div class="fb-lb">FRAME '+(G.currentFrameNum||1)+' OF '+tf+'</div></div><div class="fpips r">'+pips1+'</div></div>';
  }

  let logHtml='';
  if(CONFIG.showMatchLog){
    const rows=(G.logs||[]).map(e=>'<div class="le '+esc(e.type)+'"><span class="le-ts">'+esc(e.ts)+'</span><span class="le-tx">'+esc(e.who+(e.action?' · '+e.action:''))+'</span><span class="le-pt">'+esc(e.pts||'')+'</span></div>').join('');
    logHtml='<div class="land-right"><div class="log-sec"><div class="minilbl">// MATCH LOG</div><div class="log-scroll">'+rows+'</div></div></div>';
  }

  return '<div class="game">'+
    '<div class="sync '+(S.sync.online?'':'off')+'"><div class="sync-dot"></div><span>'+esc(S.sync.label)+'</span></div>'+
    banner+
    '<div class="gbody '+(land?'land':'')+'">'+
      '<div class="turnbar t'+G.cur+'"><span class="ta">▶</span><span class="tn">'+esc(curName)+'</span><span>TO PLAY</span><span class="tnext">'+esc(nextHint)+'</span></div>'+
      '<div class="land-left">'+
        '<div class="sb '+(S.flash?'flash':'')+'">'+
          '<div class="pside left '+(G.cur===0?'act0':'')+'"><div class="ptag">P-01</div><div class="pnm">'+buildNameHTML(G,0)+'</div><div class="psc '+(S.bump[0]?'bump':'')+'">'+G.scores[0]+'</div><div class="pbrk">BRK <b>'+(G.breaks[0]||'—')+'</b></div></div>'+
          '<div class="score-mid"><div class="vs">VS</div><div class="diff">'+diffLabel+'</div><button class="score-edit" data-act="adjustopen"><i class="fa-solid fa-sliders"></i></button></div>'+
          '<div class="pside right '+(G.cur===1?'act1':'')+'"><div class="ptag">P-02</div><div class="pnm">'+buildNameHTML(G,1)+'</div><div class="psc '+(S.bump[1]?'bump':'')+'">'+G.scores[1]+'</div><div class="pbrk">BRK <b>'+(G.breaks[1]||'—')+'</b></div></div>'+
        '</div>'+
        '<div class="strip">'+
          '<div class="cell"><div class="cell-l">TARGET</div><div class="cell-v ph">'+esc(target)+'</div></div>'+
          '<div class="cell"><div class="cell-l">REDS</div><div class="cell-v">'+Math.max(0,G.redsRemaining||0)+'</div></div>'+
          '<div class="cell"><div class="cell-l">AVAIL</div><div class="cell-v">'+calcPointsLeft(G)+'</div></div>'+
          '<div class="cell"><div class="cell-l">PHASE</div><div class="cell-v ph">'+esc(G.phase)+'</div></div>'+
        '</div>'+
        snkHtml+
        '<div class="ball-sec"><div class="minilbl">// POT BALL</div><div class="ball-grid">'+ballsHtml+'</div></div>'+
        '<div class="act-sec"><div class="act-grid">'+
          '<button class="act miss" data-act="miss"><i class="fa-solid fa-xmark"></i><span>MISS</span></button>'+
          '<button class="act foul" data-act="foulopen"><i class="fa-solid fa-triangle-exclamation"></i><span>FOUL</span></button>'+
          '<button class="act endm" data-act="endmatchopen"><i class="fa-solid fa-flag-checkered"></i><span>END MATCH</span></button>'+
          '<button class="act undo" data-act="undo"><i class="fa-solid fa-rotate-left"></i><span>UNDO</span></button>'+
        '</div></div>'+
      '</div>'+
      logHtml+
    '</div>'+
  '</div>';
}

function renderAnalytics(){
  const G=S.G;
  const a=computeAnalyticsData(G)||{players:['P1','P2'],scores:[0,0],stats:[{pots:0,fouls:0,misses:0,ballCounts:{}},{pots:0,fouls:0,misses:0,ballCounts:{}}],totals:[0,0]};
  const total=(a.scores[0]||0)+(a.scores[1]||0)||1;
  const mp=Math.max(1,a.stats[0].pots,a.stats[1].pots), mf=Math.max(1,a.stats[0].fouls,a.stats[1].fouls), mm=Math.max(1,a.stats[0].misses,a.stats[1].misses);
  const pct=(i,k)=>{ const t=a.totals[i]; return t?Math.round((a.stats[i][k]/t)*100)+'%':'0%'; };
  const mk=(label,k,max,asPct)=>{
    const v0=asPct?pct(0,k):a.stats[0][k], v1=asPct?pct(1,k):a.stats[1][k];
    const w0=(max?Math.round((a.stats[0][k]/max)*100):0)+'%', w1=(max?Math.round((a.stats[1][k]/max)*100):0)+'%';
    return '<div class="an-stat"><div class="an-stat-l">'+label+'</div><div class="an-stat-rows">'+
      '<div class="an-stat-row"><div class="an-stat-row-n">'+esc(a.players[0])+'</div><div class="an-rt"><div class="an-rf p0" style="width:'+w0+'"></div></div><div class="an-stat-row-v">'+v0+'</div></div>'+
      '<div class="an-stat-row"><div class="an-stat-row-n">'+esc(a.players[1])+'</div><div class="an-rt"><div class="an-rf p1" style="width:'+w1+'"></div></div><div class="an-stat-row-v">'+v1+'</div></div>'+
    '</div></div>';
  };
  const stats=mk('POTS','pots',mp,false)+mk('POT %','pots',mp,true)+mk('FOULS','fouls',mf,false)+mk('FOUL %','fouls',mf,true)+mk('MISSES','misses',mm,false)+mk('MISS %','misses',mm,true);
  const balls=BALL_ORDER.map(b=>'<div class="an-ball"><div class="an-ball-d" style="background:'+BALL_STYLES[b]+'">'+BALL_PTS[b]+'</div><div class="an-ball-l">'+b.slice(0,3).toUpperCase()+'</div><div class="an-ball-c">'+((a.stats[0].ballCounts[b]||0)+(a.stats[1].ballCounts[b]||0))+'</div></div>').join('');
  return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">'+
    '<div class="grip"></div><div class="sh-ttl">MATCH ANALYTICS</div><div class="sh-sub">'+(G.phase===PHASE.ENDED?'// POST-MATCH //':'// LIVE //')+'</div>'+
    '<div class="an-bar"><div class="an-side"><div class="an-nm">'+esc(a.players[0])+'</div><div class="an-v v0">'+a.scores[0]+'</div></div><div class="an-track"><div class="an-fill0" style="width:'+((a.scores[0]/total)*100)+'%"></div><div class="an-fill1" style="width:'+((a.scores[1]/total)*100)+'%"></div></div><div class="an-side"><div class="an-nm">'+esc(a.players[1])+'</div><div class="an-v v1">'+a.scores[1]+'</div></div></div>'+
    '<div class="an-grid">'+stats+'</div>'+
    '<div class="an-slbl">// BALL BREAKDOWN</div><div class="an-balls">'+balls+'</div>'+
    '<button class="sh-cancel" data-act="closeOverlay">CLOSE</button>'+
  '</div></div>';
}
function renderConclusion(){
  const G=S.G; const frames=conclusionFrames();
  let body;
  if(!frames.length){ body='<div class="conc-tabs"></div><div class="nomatch">NO FRAMES YET</div>'; }
  else {
    const idx=Math.min(S.conclusionFrame,frames.length-1); const f=frames[idx];
    const tabs=frames.map((fr,i)=>'<div class="conc-tab '+(i===idx?'on':'')+'" data-act="conctab" data-i="'+i+'">'+(fr.live?'LIVE':'FR '+fr.frame)+'</div>').join('');
    const pl=f.players||G.players||['P1','P2']; const p0=pl[0]||'P1', p1=pl[1]||'P2';
    const w=f.winner, mb=f.maxBreak||[0,0], fc=f.foulCount||[0,0], mfp=f.maxFoulPenalty||[0,0], tp=f.totalPots||[0,0];
    const bc=f.ballCounts||{}; const hb=Math.max(mb[0],mb[1]);
    const misses=[0,1].map(i=>(f.logs||[]).filter(e=>e.type==='miss'&&whoToTeam(e.who,pl)===i).length);
    const acc=[0,1].map(i=>{ const t=(tp[i]||0)+(misses[i]||0)+(fc[i]||0); return t?Math.round(((tp[i]||0)/t)*100):0; });
    const card=(label,v0,v1,c0,c1)=>'<div class="conc-card"><div class="conc-card-l">'+label+'</div><div class="conc-row"><div class="conc-row-p">'+esc(p0)+'</div><div class="conc-row-v '+(c0||'')+'">'+v0+'</div></div><div class="conc-row"><div class="conc-row-p">'+esc(p1)+'</div><div class="conc-row-v '+(c1||'')+'">'+v1+'</div></div></div>';
    const cards=
      card('// HIGHEST BREAK',mb[0]||0,mb[1]||0,mb[0]>=hb&&mb[0]>0?'hi':'',mb[1]>=hb&&mb[1]>0?'hi':'')+
      card('// TOTAL POTS',tp[0]||0,tp[1]||0,tp[0]>=tp[1]&&tp[0]>0?'hi':'',tp[1]>=tp[0]&&tp[1]>0?'hi':'')+
      card('// TOTAL FOULS',fc[0]||0,fc[1]||0,fc[0]>0?'red':'',fc[1]>0?'red':'')+
      card('// ACCURACY %',acc[0]+'%',acc[1]+'%',acc[0]>acc[1]?'hi':'',acc[1]>acc[0]?'hi':'')+
      card('// MAX FOUL PTS',mfp[0]||0,mfp[1]||0,mfp[0]>0?'red':'',mfp[1]>0?'red':'')+
      card('// MISSES',misses[0]||0,misses[1]||0,'blue','blue');
    const balls=BALL_ORDER.map(b=>{ const c0=(bc[b]&&bc[b][0])||0, c1=(bc[b]&&bc[b][1])||0, max=Math.max(1,c0+c1); return '<div class="conc-bb-row"><div class="conc-bb-d" style="background:'+BALL_STYLES[b]+'">'+BALL_PTS[b]+'</div><div class="conc-bb-n">'+BALL_FULL[b]+'</div><div class="conc-bb-bars"><div class="conc-bb-w"><div class="conc-bb-t"><div class="conc-bb-f" style="background:var(--g);width:'+Math.round((c0/max)*100)+'%"></div></div></div><div class="conc-bb-c">'+c0+'</div><div class="conc-bb-c" style="color:var(--c)">'+c1+'</div><div class="conc-bb-w"><div class="conc-bb-t"><div class="conc-bb-f" style="background:var(--c);width:'+Math.round((c1/max)*100)+'%"></div></div></div></div></div>'; }).join('');
    const wName=w>=0?((pl[w])||'P'+(w+1))+' WINS FRAME':(f.live?'IN PROGRESS':'FRAME LEVEL');
    body='<div class="conc-tabs">'+tabs+'</div>'+
      '<div class="conc-w"><div class="conc-w-l">'+(f.live?'LIVE FRAME':'FRAME '+f.frame+' RESULT')+'</div><div class="conc-w-n">'+esc(wName)+'</div><div class="conc-w-s">'+f.scores[0]+' — '+f.scores[1]+'</div></div>'+
      '<div class="conc-grid">'+cards+'</div>'+
      '<div><div class="conc-card-l">// BALL BREAKDOWN</div>'+balls+
        '<div style="display:flex;justify-content:space-between;padding:5px 0;margin-top:4px;"><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--g)">◀ '+esc(p0)+'</div><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--c)">'+esc(p1)+' ▶</div></div>'+
      '</div>';
  }
  return '<div class="ov" data-act="closeOverlay"><div class="sheet" data-act="stop">'+
    '<div class="grip"></div><div class="sh-ttl">MATCH SUMMARY</div>'+body+
    '<button class="sh-cancel" data-act="closeOverlay">CLOSE</button>'+
  '</div></div>';
}

/* =====================================================================
   EVENT WIRING — one delegated listener set on #app
   ===================================================================== */
const app=document.getElementById('app');
app.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const a=t.dataset.act, d=t.dataset;
  switch(a){
    case 'stop': e.stopPropagation(); return;
    case 'create': onCreate(); break;
    case 'back': goLobby(); break;
    case 'join': joinByInput(); break;
    case 'copyPending': copyPending(); break;
    case 'toggleMute': toggleMute(); break;
    case 'toggleLang': toggleLang(); break;
    case 'restart': confirmRestart(); break;
    case 'share': share(); break;
    case 'openConc': openConclusion(); break;
    case 'openAnalytics': openAnalytics(); break;
    case 'open': joinMatch(d.code); break;
    case 'del': e.stopPropagation(); askDelete(d.code); break;
    case 'pot': onPot(d.colour, parseInt(d.pts)); break;
    case 'frame': pickFrames(parseInt(d.n)); break;
    case 'sub': pickSub(parseInt(d.team), parseInt(d.i)); break;
    case 'hcap': hcapAdj(parseInt(d.team), parseInt(d.d)); break;
    case 'start': onStart(); break;
    case 'miss': onMiss(); break;
    case 'foulopen': openFoul(); break;
    case 'endmatchopen': openEndMatch(); break;
    case 'undo': onUndo(); break;
    case 'adjustopen': openAdjust(); break;
    case 'foulpick': applyFoul(parseInt(d.pts), S.foul.redOn?S.foul.redCount:0); break;
    case 'applyfoul': applyFoulCustom(); break;
    case 'toggleRedFoul': toggleRedFoul(); break;
    case 'redminus': e.stopPropagation(); redMinus(); break;
    case 'redplus': e.stopPropagation(); redPlus(); break;
    case 'adjtab': adjSetTeam(parseInt(d.team)); break;
    case 'adj': adjAdd(parseInt(d.d)); break;
    case 'adjapply': adjApply(); break;
    case 'empick': emPick(parseInt(d.i)); break;
    case 'emconfirm': emConfirm(); break;
    case 'conctab': switchConc(parseInt(d.i)); break;
    case 'closeOverlay': closeOverlay(); break;
    case 'confirmDelete': confirmDelete(); break;
    case 'winlobby': closeOverlay(); firebaseStopListen(); goLobby(); break;
    case 'winstats': openConclusion(); break;
    case 'winrespot': onRespotBlack(); break;
    case 'windraw': onAcceptDraw(); break;
    case 'winnext': nextFrame(); break;
    case 'windismiss': closeOverlay(); break;
  }
});
app.addEventListener('input',e=>{
  const k=e.target.dataset.fkey;
  if(k==='p1'){ S.su.p1=e.target.value; render(); }
  else if(k==='p2'){ S.su.p2=e.target.value; render(); }
  else if(k==='foulcustom'){ S.foul.custom=e.target.value; }   // no re-render: keep typing
});
app.addEventListener('change',e=>{
  const k=e.target.dataset.fkey;
  if(k==='reds') S.su.reds=parseInt(e.target.value);
  else if(k==='break') S.su.breakFirst=parseInt(e.target.value);
});
app.addEventListener('keydown',e=>{
  if(e.target.dataset.fkey==='join' && e.key==='Enter') joinByInput();
});

/* viewport (landscape/tablet) */
function onResize(){
  const ls=window.innerWidth>window.innerHeight && window.innerWidth>=680;
  if(ls!==S.viewport.landscape){ S.viewport.landscape=ls; render(); }
}
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',onResize);

/* warm up voices (some browsers populate getVoices async) */
if(window.speechSynthesis){ try{ window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged=()=>{}; }catch(e){} }

/* go */
initRoute();
</script>
</body>
</html>
