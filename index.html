<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>SNOOKER SCOREBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ─── TOKENS ─── */
:root{
  --bg:       #080c0a;
  --surface:  #0f1511;
  --surface2: #141a16;
  --border:   #1e2820;
  --border2:  #2d3d31;
  --hi:       #e8efe9;
  --mid:      #7a9480;
  --low:      #3a5040;
  --accent:   #4cff8a;
  --dim:      #111711;
  --scan:     rgba(76,255,138,0.008);

  /* Real snooker ball colours */
  --ball-red:    #c0392b;
  --ball-yellow: #f1c40f;
  --ball-green:  #27ae60;
  --ball-brown:  #8B4513;
  --ball-blue:   #2980b9;
  --ball-pink:   #e91e8c;
  --ball-black:  #1a1a1a;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body{
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--hi);
  font-family:'Rajdhani',sans-serif;
  touch-action:manipulation;
  user-select:none;
  -webkit-user-select:none;
}

/* scanline */
body::before{
  content:'';
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,var(--scan) 3px,var(--scan) 4px);
  pointer-events:none;
  z-index:9999;
}

/* ─── FULL-SCREEN LAYOUT ─── */
#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
  overflow:hidden;
}

/* ─── HEADER ─── */
.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 14px 6px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg);
}

.hdr-title{
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:900;
  letter-spacing:4px;
  color:var(--accent);
}

.hdr-right{
  display:flex;
  gap:8px;
  align-items:center;
}

.icon-btn{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:6px;
  color:var(--mid);
  font-size:16px;
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:all .15s;
  flex-shrink:0;
}
.icon-btn:active{ background:var(--surface2); transform:scale(0.94); color:var(--hi); }

/* ─── SETUP SCREEN ─── */
#setupScreen{
  flex:1;
  overflow-y:auto;
  padding:16px;
}

.setup-logo{
  text-align:center;
  padding:24px 0 20px;
}

.setup-logo .big{
  font-family:'Orbitron',monospace;
  font-size:28px;
  font-weight:900;
  letter-spacing:6px;
  color:var(--accent);
}

.setup-logo .sub{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--low);
  letter-spacing:3px;
  margin-top:4px;
}

.field-label{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:var(--low);
  text-transform:uppercase;
  margin-bottom:5px;
}

.field-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.field-wrap{ position:relative; }

input, select{
  width:100%;
  padding:13px 14px;
  background:var(--dim);
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--hi);
  font-family:'Share Tech Mono',monospace;
  font-size:14px;
  outline:none;
  -webkit-appearance:none;
  transition:border-color .2s;
}

input:focus, select:focus{
  border-color:var(--accent);
}

select option{ background:#111; }

.start-btn{
  width:100%;
  margin-top:20px;
  padding:18px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:#000;
  font-family:'Orbitron',monospace;
  font-size:14px;
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
}
.start-btn:active{ transform:scale(0.97); opacity:.85; }

/* ─── GAME SCREEN ─── */
#gameScreen{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  gap:0;
}

/* ─── SCOREBOARD ─── */
.scoreboard{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.player-side{
  padding:10px 12px;
  position:relative;
  transition:background .3s;
}

.player-side.active{
  background:rgba(76,255,138,0.04);
}

.player-side.left{ text-align:left; }
.player-side.right{ text-align:right; }

.p-tag{
  font-family:'Share Tech Mono',monospace;
  font-size:8px;
  letter-spacing:2px;
  color:var(--low);
  margin-bottom:2px;
}

.p-name{
  font-family:'Orbitron',monospace;
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--mid);
  margin-bottom:4px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  transition:color .3s;
}

.player-side.active .p-name{ color:var(--accent); }

.p-score{
  font-family:'Orbitron',monospace;
  font-size:48px;
  font-weight:900;
  line-height:1;
  color:var(--hi);
  letter-spacing:-2px;
}

.p-break{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--low);
  margin-top:3px;
  letter-spacing:1px;
}

.p-break span{
  color:var(--accent);
  font-weight:700;
}

/* Active indicator line */
.active-line{
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:transparent;
  transition:.3s;
}

.player-side.active .active-line{
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  box-shadow:0 0 8px var(--accent);
}

.score-mid{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 12px;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
}

.vs{
  font-family:'Orbitron',monospace;
  font-size:8px;
  color:var(--low);
  letter-spacing:2px;
}

.turn-dot{
  width:8px; height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent);
  margin-top:4px;
  animation:pulse 1.4s infinite;
  transition:transform .3s;
}

.turn-dot.right{ transform:translateX(6px); }
.turn-dot.left{  transform:translateX(-6px); }

/* ─── STATUS STRIP ─── */
.status-strip{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.stat-cell{
  background:var(--bg);
  padding:7px 6px;
  text-align:center;
}

.stat-lbl{
  font-family:'Share Tech Mono',monospace;
  font-size:7px;
  letter-spacing:1px;
  color:var(--low);
  text-transform:uppercase;
  margin-bottom:3px;
}

.stat-val{
  font-family:'Orbitron',monospace;
  font-size:14px;
  font-weight:700;
  color:var(--hi);
}

.stat-val.phase{
  font-size:11px;
  color:var(--accent);
  letter-spacing:1px;
}

/* ─── BALL GRID ─── */
.ball-section{
  padding:10px 12px 8px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
}

.section-lbl{
  font-family:'Share Tech Mono',monospace;
  font-size:8px;
  letter-spacing:2px;
  color:var(--low);
  text-transform:uppercase;
  margin-bottom:8px;
}

.ball-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
}

.ball-btn{
  aspect-ratio:1;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
  position:relative;
  overflow:hidden;
  transition:all .15s;
  /* 3D sphere effect */
  box-shadow:
    inset 0 -4px 8px rgba(0,0,0,0.6),
    inset 0 2px 4px rgba(255,255,255,0.2),
    0 2px 8px rgba(0,0,0,0.5);
}

/* highlight spot for 3D look */
.ball-btn::after{
  content:'';
  position:absolute;
  top:12%; left:18%;
  width:28%; height:22%;
  background:rgba(255,255,255,0.35);
  border-radius:50%;
  transform:rotate(-35deg);
  pointer-events:none;
}

/* Bottom shadow for 3D depth */
.ball-btn::before{
  content:'';
  position:absolute;
  bottom:8%; left:20%;
  width:60%; height:20%;
  background:rgba(0,0,0,0.3);
  border-radius:50%;
  filter:blur(3px);
  pointer-events:none;
}

.ball-btn:active:not(.disabled){ transform:scale(0.92); }

.ball-btn .pts{
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:900;
  color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
  line-height:1;
  position:relative;
  z-index:2;
}

.ball-btn .bname{
  font-family:'Share Tech Mono',monospace;
  font-size:6px;
  letter-spacing:.5px;
  color:rgba(255,255,255,0.75);
  text-shadow:0 1px 2px rgba(0,0,0,0.9);
  position:relative;
  z-index:2;
}

/* Real snooker ball colours with 3D gradient */
.b-red    { background:radial-gradient(circle at 38% 32%, #e74c3c, var(--ball-red) 50%, #7b0000 100%); border-color:rgba(255,100,100,0.3); }
.b-yellow { background:radial-gradient(circle at 38% 32%, #f9e34a, var(--ball-yellow) 50%, #8a6d00 100%); border-color:rgba(255,220,50,0.3); }
.b-green  { background:radial-gradient(circle at 38% 32%, #52d68a, var(--ball-green) 50%, #145a32 100%); border-color:rgba(80,220,120,0.3); }
.b-brown  { background:radial-gradient(circle at 38% 32%, #c0714a, var(--ball-brown) 50%, #3d1a05 100%); border-color:rgba(160,90,50,0.3); }
.b-blue   { background:radial-gradient(circle at 38% 32%, #5dade2, var(--ball-blue) 50%, #154360 100%); border-color:rgba(80,150,220,0.3); }
.b-pink   { background:radial-gradient(circle at 38% 32%, #f48fb1, var(--ball-pink) 50%, #880040 100%); border-color:rgba(240,100,180,0.3); }
.b-black  { background:radial-gradient(circle at 38% 32%, #4a4a4a, #222 50%, #000 100%); border-color:rgba(100,100,100,0.3); }

.ball-btn.disabled{
  opacity:0.22;
  pointer-events:none;
  filter:grayscale(0.8);
}

/* ─── ACTION BUTTONS ─── */
.action-section{
  padding:8px 12px;
  flex-shrink:0;
}

.action-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.act-btn{
  padding:12px 6px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--mid);
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}

.act-btn .act-icon{ font-size:18px; line-height:1; }
.act-btn:active{ transform:scale(0.95); background:var(--surface2); }

.act-btn.foul-btn{
  border-color:#c0392b55;
  color:#e74c3c;
}
.act-btn.foul-btn:active{ background:rgba(192,57,43,0.1); }

.act-btn.miss-btn{
  border-color:#e67e2255;
  color:#e67e22;
}
.act-btn.miss-btn:active{ background:rgba(230,126,34,0.1); }

.act-btn.undo-btn:active{ background:rgba(52,152,219,0.1); color:#3498db; }

.act-btn.restart-btn{ border-color:var(--border); }

/* ─── LOG ─── */
.log-section{
  flex:1;
  padding:0 12px 8px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.log-scroll{
  flex:1;
  overflow-y:auto;
  scrollbar-width:none;
  display:flex;
  flex-direction:column;
  gap:4px;
  padding-right:2px;
}
.log-scroll::-webkit-scrollbar{ display:none; }

.log-entry{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:8px;
  align-items:center;
  padding:7px 10px;
  background:var(--surface);
  border-left:2px solid var(--border2);
  border-radius:4px;
  animation:slideIn .2s ease;
  flex-shrink:0;
}

.log-entry.foul{ border-left-color:#e74c3c; }
.log-entry.miss{ border-left-color:#e67e22; }
.log-entry.pot { border-left-color:#27ae60; }
.log-entry.system{ border-left-color:var(--accent); }

.log-ts{
  font-family:'Share Tech Mono',monospace;
  font-size:8px;
  color:var(--low);
  white-space:nowrap;
}

.log-text{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:var(--mid);
}

.log-pts{
  font-family:'Orbitron',monospace;
  font-size:10px;
  font-weight:700;
  color:var(--hi);
  white-space:nowrap;
}

/* ─── MODAL / DIALOG ─── */
.overlay{
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:500;
  animation:fadeIn .2s;
  padding-bottom: var(--safe-bot);
}

.overlay.center{
  align-items:center;
}

.sheet{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:20px 16px 24px;
  width:100%;
  max-width:480px;
  animation:slideUp .3s cubic-bezier(.34,1.2,.64,1);
}

.sheet.center-sheet{
  border-radius:16px;
  width:90%;
  max-width:380px;
  animation:scaleIn .25s cubic-bezier(.34,1.3,.64,1);
}

.sheet-handle{
  width:40px; height:4px;
  background:var(--border2);
  border-radius:2px;
  margin:0 auto 16px;
}

.sheet-title{
  font-family:'Orbitron',monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:3px;
  color:var(--accent);
  text-align:center;
  margin-bottom:4px;
}

.sheet-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  color:var(--low);
  text-align:center;
  letter-spacing:2px;
  margin-bottom:16px;
}

/* Foul grid inside sheet */
.foul-opts{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.foul-opt{
  padding:16px 8px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--dim);
  color:#e74c3c;
  font-family:'Orbitron',monospace;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-align:center;
  transition:all .15s;
  display:flex;
  flex-direction:column;
  gap:2px;
  align-items:center;
}
.foul-opt:active{ transform:scale(0.93); background:rgba(192,57,43,0.15); border-color:#e74c3c; }
.foul-opt small{
  font-family:'Share Tech Mono',monospace;
  font-size:7px;
  color:var(--low);
  letter-spacing:1px;
}

.foul-custom-row{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.foul-custom-input{
  flex:1;
  padding:13px 14px;
  background:var(--dim);
  border:1px solid var(--border2);
  border-radius:10px;
  color:#e74c3c;
  font-family:'Orbitron',monospace;
  font-size:18px;
  font-weight:700;
  outline:none;
  text-align:center;
  -webkit-appearance:none;
}

.foul-custom-input:focus{ border-color:#e74c3c; }

.foul-custom-btn{
  padding:13px 20px;
  border-radius:10px;
  border:1px solid #e74c3c55;
  background:rgba(192,57,43,0.12);
  color:#e74c3c;
  font-family:'Orbitron',monospace;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:.15s;
}
.foul-custom-btn:active{ transform:scale(0.95); background:rgba(192,57,43,0.25); }

.sheet-cancel{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--dim);
  color:var(--mid);
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:2px;
  cursor:pointer;
  transition:.15s;
}
.sheet-cancel:active{ background:var(--surface2); color:var(--hi); }

/* Winner modal */
.winner-box{
  text-align:center;
  padding:8px 0 16px;
}

.winner-label{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:3px;
  color:var(--low);
  margin-bottom:8px;
}

.winner-name{
  font-family:'Orbitron',monospace;
  font-size:26px;
  font-weight:900;
  color:var(--accent);
  letter-spacing:2px;
  margin-bottom:4px;
}

.winner-score{
  font-family:'Share Tech Mono',monospace;
  font-size:16px;
  color:var(--mid);
  letter-spacing:4px;
  margin-bottom:24px;
}

.modal-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.modal-btn{
  padding:16px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:var(--dim);
  color:var(--hi);
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:2px;
  cursor:pointer;
  transition:.15s;
}
.modal-btn:active{ background:var(--surface2); }
.modal-btn.primary{ background:rgba(76,255,138,0.12); border-color:var(--accent); color:var(--accent); }
.modal-btn.primary:active{ background:rgba(76,255,138,0.22); }

/* ─── UTILITY ─── */
.hidden{ display:none !important; }

/* ─── ANIMATIONS ─── */
@keyframes pulse{
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:0.6; transform:scale(0.85); }
}

@keyframes slideIn{
  from{ opacity:0; transform:translateX(-8px); }
  to{ opacity:1; transform:translateX(0); }
}

@keyframes slideUp{
  from{ transform:translateY(60px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}

@keyframes fadeIn{
  from{ opacity:0; }
  to{ opacity:1; }
}

@keyframes scaleIn{
  from{ opacity:0; transform:scale(0.88); }
  to{ opacity:1; transform:scale(1); }
}

@keyframes flashWarn{
  0%,100%{ background:var(--bg); }
  50%{ background:rgba(231,76,60,0.08); }
}

/* ─── RESPONSIVE TWEAKS ─── */
@media(max-width:375px){
  .p-score{ font-size:40px; }
  .ball-btn .pts{ font-size:11px; }
  .ball-btn .bname{ font-size:5px; }
  .ball-grid{ gap:5px; }
  .foul-opts{ grid-template-columns:repeat(4,1fr); gap:6px; }
}

@media(min-height:750px){
  .ball-section{ padding:12px 14px 10px; }
  .action-section{ padding:10px 14px; }
  .ball-grid{ gap:9px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- ═══ HEADER ═══ -->
  <header class="hdr">
    <div class="hdr-title">SNOOKER</div>
    <div class="hdr-right">
      <div class="icon-btn" onclick="undo()" title="Undo">↩</div>
      <div class="icon-btn" onclick="confirmRestart()" title="Restart">⟳</div>
    </div>
  </header>

  <!-- ═══ SETUP SCREEN ═══ -->
  <div id="setupScreen" style="flex:1;overflow-y:auto;padding:16px;">
    <div class="setup-logo">
      <div class="big">SNOOKER</div>
      <div class="sub">// MATCH SETUP //</div>
    </div>

    <div class="field-row">
      <div class="field-wrap">
        <div class="field-label">PLAYER 1</div>
        <input type="text" id="p1" placeholder="ALPHA" maxlength="12"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">PLAYER 2</div>
        <input type="text" id="p2" placeholder="BRAVO" maxlength="12"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field-wrap">
        <div class="field-label">RED BALLS</div>
        <select id="redsCount">
          <option value="6">6 REDS</option>
          <option value="10">10 REDS</option>
          <option value="15" selected>15 REDS</option>
        </select>
      </div>
      <div class="field-wrap">
        <div class="field-label">BREAK FIRST</div>
        <select id="breakFirst">
          <option value="0">PLAYER 1</option>
          <option value="1">PLAYER 2</option>
        </select>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">▸ START MATCH</button>
  </div>

  <!-- ═══ GAME SCREEN ═══ -->
  <div id="gameScreen" class="hidden" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

    <!-- SCOREBOARD -->
    <div class="scoreboard">
      <div class="player-side left" id="playerCell0">
        <div class="p-tag">P-01</div>
        <div class="p-name" id="pname0">—</div>
        <div class="p-score" id="pscore0">0</div>
        <div class="p-break" id="pbreak0">BRK <span>—</span></div>
        <div class="active-line"></div>
      </div>

      <div class="score-mid">
        <div class="vs">VS</div>
        <div class="turn-dot" id="turnDot"></div>
      </div>

      <div class="player-side right" id="playerCell1">
        <div class="p-tag">P-02</div>
        <div class="p-name" id="pname1">—</div>
        <div class="p-score" id="pscore1">0</div>
        <div class="p-break" id="pbreak1">BRK <span>—</span></div>
        <div class="active-line"></div>
      </div>
    </div>

    <!-- STATUS STRIP -->
    <div class="status-strip">
      <div class="stat-cell">
        <div class="stat-lbl">TARGET</div>
        <div class="stat-val phase" id="nextTarget">RED</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">REDS</div>
        <div class="stat-val" id="redsOnTable">15</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">AVAIL</div>
        <div class="stat-val" id="ptsAvail">147</div>
      </div>
      <div class="stat-cell">
        <div class="stat-lbl">PHASE</div>
        <div class="stat-val phase" id="gamePhase">REDS</div>
      </div>
    </div>

    <!-- BALLS -->
    <div class="ball-section">
      <div class="section-lbl">// POT BALL</div>
      <div class="ball-grid">
        <button class="ball-btn b-red"    id="btn-red"    onclick="potBall('red',1)">
          <span class="pts">1</span><span class="bname">RED</span>
        </button>
        <button class="ball-btn b-yellow" id="btn-yellow" onclick="potBall('yellow',2)">
          <span class="pts">2</span><span class="bname">YLW</span>
        </button>
        <button class="ball-btn b-green"  id="btn-green"  onclick="potBall('green',3)">
          <span class="pts">3</span><span class="bname">GRN</span>
        </button>
        <button class="ball-btn b-brown"  id="btn-brown"  onclick="potBall('brown',4)">
          <span class="pts">4</span><span class="bname">BRN</span>
        </button>
        <button class="ball-btn b-blue"   id="btn-blue"   onclick="potBall('blue',5)">
          <span class="pts">5</span><span class="bname">BLU</span>
        </button>
        <button class="ball-btn b-pink"   id="btn-pink"   onclick="potBall('pink',6)">
          <span class="pts">6</span><span class="bname">PNK</span>
        </button>
        <button class="ball-btn b-black"  id="btn-black"  onclick="potBall('black',7)">
          <span class="pts">7</span><span class="bname">BLK</span>
        </button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-section">
      <div class="action-grid">
        <button class="act-btn miss-btn" onclick="missShot()">
          <span class="act-icon">◈</span>
          <span>MISS</span>
        </button>
        <button class="act-btn foul-btn" onclick="openFoulDialog()">
          <span class="act-icon">⚠</span>
          <span>FOUL</span>
        </button>
        <button class="act-btn undo-btn" onclick="undo()">
          <span class="act-icon">↩</span>
          <span>UNDO</span>
        </button>
      </div>
    </div>

    <!-- MATCH LOG -->
    <div class="log-section">
      <div class="section-lbl">// MATCH LOG</div>
      <div class="log-scroll" id="logFeed"></div>
    </div>

  </div>

</div>

<!-- ═══ FOUL DIALOG ═══ -->
<div class="overlay hidden" id="foulOverlay" onclick="closeFoulDialog(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">FOUL PENALTY</div>
    <div class="sheet-sub">// POINTS AWARDED TO OPPONENT //</div>

    <div class="foul-opts">
      <div class="foul-opt" onclick="foul(4)">
        4
        <small>PTS</small>
      </div>
      <div class="foul-opt" onclick="foul(5)">
        5
        <small>PTS</small>
      </div>
      <div class="foul-opt" onclick="foul(6)">
        6
        <small>PTS</small>
      </div>
      <div class="foul-opt" onclick="foul(7)">
        7
        <small>PTS</small>
      </div>
    </div>

    <div class="foul-custom-row">
      <input
        class="foul-custom-input"
        type="number"
        id="customFoulPts"
        placeholder="—"
        min="4" max="99"
        inputmode="numeric"
      />
      <button class="foul-custom-btn" onclick="foulCustom()">APPLY</button>
    </div>

    <button class="sheet-cancel" onclick="closeFoulDialog()">CANCEL</button>
  </div>
</div>

<!-- ═══ WINNER MODAL ═══ -->
<div class="overlay center hidden" id="winnerModal">
  <div class="sheet center-sheet">
    <div class="winner-box">
      <div class="winner-label">// FRAME COMPLETE //</div>
      <div class="winner-name" id="modalWinner">—</div>
      <div class="winner-score" id="modalScore">—</div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="restartToSetup()">NEW MATCH</button>
      <button class="modal-btn primary" onclick="closeModal()">DISMISS</button>
    </div>
  </div>
</div>

<!-- ═══ SCRIPT ═══ -->
<script>
/* ─── CONSTANTS ─── */
const PHASE = { REDS:'REDS', COLORS:'COLOURS', ENDED:'ENDED' };
const COLOR_ORDER = ['yellow','green','brown','blue','pink','black'];

let G = {};
let logSeq = 0;

/* ─── POINTS REMAINING ─── */
function calcPointsLeft(s){
  if(s.phase === PHASE.COLORS){
    const vals = {yellow:2,green:3,brown:4,blue:5,pink:6,black:7};
    return COLOR_ORDER.slice(s.colourIndex).reduce((a,c)=>a+vals[c],0);
  }
  return s.redsRemaining * 8 + 27;
}

/* ─── INIT STATE ─── */
function newGameState(p1,p2,reds,first){
  return {
    players:[p1,p2], scores:[0,0], breaks:[0,0],
    cur:first, redsRemaining:reds,
    phase:PHASE.REDS, nextIsRed:true,
    colourIndex:0, history:[], logs:[]
  };
}

/* ─── START ─── */
function startGame(){
  const p1   = (document.getElementById('p1').value.trim()||'ALPHA').toUpperCase();
  const p2   = (document.getElementById('p2').value.trim()||'BRAVO').toUpperCase();
  const reds = parseInt(document.getElementById('redsCount').value);
  const first= parseInt(document.getElementById('breakFirst').value);
  G = newGameState(p1,p2,reds,first);
  logEvent('system','MATCH STARTED','','');
  logEvent('system',`BREAK: ${G.players[first]}`,'','');
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  render();
}

/* ─── UNDO ─── */
function saveSnap(){
  G.history.push(JSON.stringify({...G,history:[]}));
  if(G.history.length>60) G.history.shift();
}

function undo(){
  if(!G.history.length) return flashWarn();
  const snap = JSON.parse(G.history.pop());
  snap.history = G.history;
  snap.logs    = G.logs;
  G = snap;
  logEvent('system','UNDO','','');
  render();
}

/* ─── POT BALL ─── */
function potBall(colour,pts){
  if(G.phase===PHASE.ENDED) return;
  saveSnap();
  const p = G.cur;
  G.scores[p] += pts;
  G.breaks[p] += pts;

  if(G.phase===PHASE.REDS){
    if(colour==='red'){
      if(!G.nextIsRed){ G.history.pop(); return warn('Pot a COLOUR next!'); }
      G.redsRemaining--;
      G.nextIsRed = false;
      logEvent('pot',G.players[p],'POTS RED',`+${pts}`);
    } else {
      if(G.nextIsRed){ G.history.pop(); return warn('Pot a RED next!'); }
      logEvent('pot',G.players[p],`POTS ${colour.toUpperCase()}`,`+${pts}`);
      G.nextIsRed = true;
      if(G.redsRemaining===0){
        G.phase = PHASE.COLORS;
        G.colourIndex = 0;
        logEvent('system','ALL REDS CLEARED — COLOURS PHASE','','');
      }
    }
  } else if(G.phase===PHASE.COLORS){
    const expected = COLOR_ORDER[G.colourIndex];
    if(colour!==expected){ G.history.pop(); return warn(`Pot ${expected.toUpperCase()} next!`); }
    logEvent('pot',G.players[p],`POTS ${colour.toUpperCase()}`,`+${pts}`);
    G.colourIndex++;
    if(G.colourIndex>=COLOR_ORDER.length){ endFrame(); return; }
  }
  render();
}

/* ─── MISS ─── */
function missShot(){
  if(G.phase===PHASE.ENDED) return;
  saveSnap();
  logEvent('miss',G.players[G.cur],'MISS — TURN ENDS','');
  switchTurn();
  render();
}

/* ─── FOUL DIALOG ─── */
function openFoulDialog(){
  if(G.phase===PHASE.ENDED) return;
  document.getElementById('customFoulPts').value='';
  document.getElementById('foulOverlay').classList.remove('hidden');
}

function closeFoulDialog(e){
  if(!e || e.target===document.getElementById('foulOverlay'))
    document.getElementById('foulOverlay').classList.add('hidden');
}

function foul(pts){
  document.getElementById('foulOverlay').classList.add('hidden');
  if(G.phase===PHASE.ENDED) return;
  saveSnap();
  const opp = G.cur===0?1:0;
  const penalty = Math.max(pts,4);
  G.scores[opp] += penalty;
  logEvent('foul',G.players[G.cur],`FOUL → ${G.players[opp]}`,`+${penalty}`);
  switchTurn();
  render();
}

function foulCustom(){
  const v = parseInt(document.getElementById('customFoulPts').value);
  if(isNaN(v)||v<4||v>99){ flashInput('customFoulPts'); return; }
  foul(v);
}

function flashInput(id){
  const el = document.getElementById(id);
  el.style.borderColor='#e74c3c';
  el.style.animation='flashWarn .4s';
  setTimeout(()=>{ el.style.borderColor=''; el.style.animation=''; },600);
}

/* ─── SWITCH TURN ─── */
function switchTurn(){
  G.cur = G.cur===0?1:0;
  G.breaks[G.cur]=0;
  if(G.phase===PHASE.REDS) G.nextIsRed=true;
}

/* ─── FRAME END ─── */
function endFrame(){
  G.phase = PHASE.ENDED;
  logEvent('system','FRAME COMPLETE','','');
  render();
  setTimeout(()=>{
    const w = G.scores[0]>G.scores[1]?0:G.scores[1]>G.scores[0]?1:-1;
    document.getElementById('modalWinner').textContent = w>=0?G.players[w]+' WINS':'DRAW';
    document.getElementById('modalScore').textContent  = `${G.scores[0]}  —  ${G.scores[1]}`;
    document.getElementById('winnerModal').classList.remove('hidden');
  },600);
}

/* ─── BALL AVAILABILITY ─── */
function updateBalls(){
  const all=['red','yellow','green','brown','blue','pink','black'];
  all.forEach(b=>document.getElementById('btn-'+b).classList.remove('disabled'));
  if(G.phase===PHASE.REDS){
    if(G.nextIsRed){
      ['yellow','green','brown','blue','pink','black'].forEach(b=>
        document.getElementById('btn-'+b).classList.add('disabled'));
    } else {
      document.getElementById('btn-red').classList.add('disabled');
    }
  } else if(G.phase===PHASE.COLORS){
    all.forEach(b=>{
      if(b!==COLOR_ORDER[G.colourIndex])
        document.getElementById('btn-'+b).classList.add('disabled');
    });
  } else {
    all.forEach(b=>document.getElementById('btn-'+b).classList.add('disabled'));
  }
}

/* ─── LOG ─── */
function logEvent(type,who,action,pts){
  const ts = new Date().toTimeString().slice(0,8);
  G.logs.unshift({type,who,action,pts,ts,id:logSeq++});
  if(G.logs.length>80) G.logs.pop();
}

/* ─── RENDER ─── */
function render(){
  document.getElementById('pscore0').textContent = G.scores[0];
  document.getElementById('pscore1').textContent = G.scores[1];
  document.getElementById('pname0').textContent  = G.players[0];
  document.getElementById('pname1').textContent  = G.players[1];

  const b0 = document.getElementById('pbreak0');
  const b1 = document.getElementById('pbreak1');
  b0.innerHTML = `BRK <span>${G.breaks[0]||'—'}</span>`;
  b1.innerHTML = `BRK <span>${G.breaks[1]||'—'}</span>`;

  document.getElementById('playerCell0').classList.toggle('active',G.cur===0);
  document.getElementById('playerCell1').classList.toggle('active',G.cur===1);

  const dot = document.getElementById('turnDot');
  dot.className = 'turn-dot ' + (G.cur===0?'left':'right');

  const nextLabel = G.phase===PHASE.REDS
    ?(G.nextIsRed?'RED':'COLOUR')
    :G.phase===PHASE.COLORS
      ?(COLOR_ORDER[G.colourIndex]||'—').toUpperCase()
      :'ENDED';

  document.getElementById('nextTarget').textContent  = nextLabel;
  document.getElementById('redsOnTable').textContent = G.redsRemaining;
  document.getElementById('ptsAvail').textContent    = calcPointsLeft(G);
  document.getElementById('gamePhase').textContent   = G.phase;

  updateBalls();

  const feed = document.getElementById('logFeed');
  feed.innerHTML = G.logs.map(e=>`
    <div class="log-entry ${e.type}">
      <span class="log-ts">${e.ts}</span>
      <span class="log-text">${e.who}${e.action?' · '+e.action:''}</span>
      <span class="log-pts">${e.pts||''}</span>
    </div>
  `).join('');
}

/* ─── MODAL ─── */
function closeModal(){
  document.getElementById('winnerModal').classList.add('hidden');
}

function confirmRestart(){
  if(confirm('Restart match?')) restartToSetup();
}

function restartToSetup(){
  closeModal();
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('setupScreen').classList.remove('hidden');
  G={}; logSeq=0;
}

/* ─── WARN ─── */
function warn(msg){
  logEvent('system','ILLEGAL',msg,'');
  flashWarn();
  render();
}

function flashWarn(){
  document.body.style.animation='flashWarn .4s';
  setTimeout(()=>{ document.body.style.animation=''; },400);
}
</script>
</body>
</html>
